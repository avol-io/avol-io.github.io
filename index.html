    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: white;
        color: black;
        font-family: "Raleway", sans-serif;
        font-size: 16px;

        overflow: hidden;
        margin: 0;
      }

      main {

      }

      #first {
        font-size: 10em;
        font-weight: 700;
        margin: 0;
      }

      #second {
        font-size: 4em;

        display: block;
        text-align: center;

        animation-duration: 1s;
        min-height: 2em;
        margin: 0 10vw;
      }

      @keyframes fadeOutUp {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translate3d(0, -100%, 0);
        }
      }

      .fadeOutUp {
        animation-duration: 1s;
        animation-name: fadeOutUp;
      }
.swithLight {
    animation: neon1 1.5s ease-in-out infinite alternate;
}

@keyframes neon1 {
    from {
        filter:
            drop-shadow(0 0 6px #fff)
            drop-shadow(0 0 15px #FF1177)
            drop-shadow(0 0 40px #FF1177);
    }
    to {
        filter:
            drop-shadow(0 0 3px #fff)
            drop-shadow(0 0 8px #FF1177)
            drop-shadow(0 0 20px #FF1177);
    }
}

@media (prefers-reduced-motion: reduce) {

        animation: none;
        filter: drop-shadow(0 0 10px #FF1177);
    }

  <body>
    <main>
      <div id="first">Sorry,</div>
      <div id="second">I have no time to make a better site.</div>
      <br />
    </main>

    <p id="aMessageForYou">
      <span id="old"></span>
      <span id="new"></span>
    </p>

    <button id="mySuperMegaYeahButton" type="button">Enter</button>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
      }
      let beonLoaded = false;

      function loadBeonFont() {
        if (beonLoaded) return;
        beonLoaded = true;
        const style = document.createElement("style");
        style.textContent = `
            @font-face {
                font-family: "Beon-Medium";
                src: url("Beon.woff2") format("woff2"),
                    url("Beon.woff") format("woff");
                font-weight: normal;
                font-style: normal;
                font-display: swap;
            }
        `;
        document.head.appendChild(style);
      }

      const abutton = document.getElementById("mySuperMegaYeahButton");
      const msgOld = document.getElementById("old");
      const msgNew = document.getElementById("new");

      let step = 1;

      const blaBlaBlaAboutMe = [
        "Really, I have no time to make a better site.", // 0
        "That's all.", // 1
        "It's true! This is everything you need to know about me and my skills.", // 2
        "Thanks for believing there is something else. Really that's all.", // 3
        "1",
        "2",
        "3",
        "4", // 4-7  (era 4-14, rimossi "5".."11")
        "Wow! You sure like a lot pressing a button, don't you?", // 8
        "Ah I see... it's because there's 'Enter' written on it", // 9
        "Okay you have a compulsive button pressing problem... Then I shift it.", // 10
        "Okay, stop or I'll turn off the lights", // 11
        "Bye!", // 12
        "Damn it!", // 13
        "Still here?", // 14
        "Look behind you, a Three-Headed Monkey!", // 15
        "Where?", // 16
        "If you didn't close your browser to go play Monkey Island after this, I might start questioning your tastes.", // 17
        "Ok, really the game is over.", // 18
        "Listen... I would like to keep playing with you but if I had more time I would have made a better site.", // 19
        "Oh okay, if you have nothing better to do then maybe you may spend some time to connect with me on LinkedIn", // 20
        "You're back... There was no need to come back here.", // 21
        "Okay I feel we can start the first button-man friendship.", // 22
        "Did you know you've been on this page for more time than it would've taken to read my CV?", // 23
        "Okay seriously if you're still here then you are wasting energy you could've used to find what's invisible to your eyes", // 24
        "Let's start again!", // 25
      ];

      let pointOfStory = 0;

      function changeWord(text) {
        msgOld.className = "";
        setTimeout(() => {
          msgOld.textContent = msgNew.textContent;
          msgNew.textContent = text;
          msgOld.className = "fadeOutUp";
        }, 10);
      }

      function defaultStep() {
        changeWord(blaBlaBlaAboutMe[pointOfStory++]);
      }

      function openCenteredPopup(url, title, w, h) {
        const left = (screen.width - w) / 2 + (screen.availLeft ?? 0);
        const top = (screen.height - h) / 2 + (screen.availTop ?? 0);
        window.open(
          url,
          title,
          `width=${w},height=${h},top=${top},left=${left},resizable=yes,scrollbars=yes`,
        );
      }

      const steps = {};

      // Default: 1-9 (intro + "1","2","3","4" + "Wow!") e tutti i passi normali
      [
        1, 2, 3, 4, 5, 6, 7, 8, 9, 15, 16, 18, 19, 21, 22, 23, 24, 25, 26,
      ].forEach((i) => {
        steps[i] = defaultStep;
      });

      steps[10] = () => {
        defaultStep();
        abutton.textContent = "Don't touch me";
        loadBeonFont();
      };

      steps[11] = () => {
        defaultStep();
        abutton.style.transition = "0.6s cubic-bezier(0.22, 0.61, 0.36, 1) all";
        abutton.style.margin = "0";
        abutton.style.transform = "translateX(calc(100vw - 100px))";
        abutton.onmouseover = () => (steps[step++] ?? defaultStep)();
      };

      steps[12] = () => {
        defaultStep();
        abutton.style.transform =
          "translateX(calc(40vw - 100px)) translateY(-200px) rotateZ(35deg)";
      };

      steps[13] = () => {
        defaultStep();
        abutton.textContent = "You don't see me... ahhaha!";
        abutton.removeAttribute("style");
        document.body.className = "blackout";
        document.getElementById("first").className = "swithLight";
        document.getElementById("second").style.animation =
          "neon1 0.8s ease-in-out infinite alternate";
        abutton.onmouseover = null;
      };

      steps[14] = () => {
        defaultStep();
        abutton.removeAttribute("style");
        abutton.textContent = "A button";
        document.body.className = "";
        document.getElementById("first").className = "";
        document.getElementById("second").removeAttribute("style");
        if (Notification.permission === "default") {
          Notification.requestPermission();
        }
      };

      steps[17] = () => {
        defaultStep();
        if (Notification.permission === "granted") {
          navigator.serviceWorker.ready.then((reg) => {
            reg.showNotification("Here!!", {
              body: "Here!!",
              icon: "/icon.jpeg",
              image: "/icon.jpeg",
              vibrate: [1000, 500, 1000, 500, 1000],
              tag: "vibration-sample",
              badge: "/icon.jpeg",
            });
          });
        } else {
          alert("No monkey if you do not allow notifications");
        }
      };

      steps[22] = () => {
        defaultStep();
        openCenteredPopup(
          "https://www.linkedin.com/in/alessandro-avolio-baa39765/",
          "LinkedIn",
          800,
          600,
        );
      };

      steps[27] = () => {
        pointOfStory = 0;
        step = 1;
      };

      abutton.addEventListener("click", () => {
        const used = step++;
        (steps[used] ?? defaultStep)();
      });
    </script>
  </body>
