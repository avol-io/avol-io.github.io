<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<title>Physics Ball</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0f0f0f;
    font-family: system-ui, sans-serif;
  }

  #div-a {
    position: fixed;
    inset: 0;
  }

  /* div-b ruota per stare allineato al mondo reale (counter-rotate rispetto al tilt) */
  #div-b {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    transform-origin: center center;
    pointer-events: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transform: translate(-50%, -50%);
  }

  #ball-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 10;
  }

  #obstacles-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  #gravity-arrow-a {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: white;
    opacity: 0.25;
    user-select: none;
    pointer-events: none;
    z-index: 30;
  }

  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    color: white;
    text-align: center;
    padding: 24px;
  }

  #permission-overlay p {
    font-size: 16px;
    opacity: 0.8;
    max-width: 300px;
  }

  #permission-btn {
    padding: 12px 32px;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
  }

  #permission-overlay.hidden { display: none; }

  #debug-info {
    position: fixed;
    top: 8px;
    left: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    z-index: 200;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 6px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <p>This experience needs access to device orientation sensors.</p>
  <button id="permission-btn" type="button">Enable Motion</button>
</div>

<div id="div-a">
  <div id="div-b">↓</div>
  <canvas id="ball-canvas">Your browser does not support the canvas element.</canvas>
  <div id="obstacles-layer">
    <div class="obstacle" style="
      position:absolute; left:20%; top:40%;
      width:60%; height:12px;
      background: rgba(255,255,255,0.12);
      border-radius:6px;
    "></div>
  </div>
  <div id="gravity-arrow-a">↓</div>
</div>

<div id="debug-info">waiting for sensor…</div>

<script>
(function () {
  'use strict';

  // ─── Costanti fisiche ────────────────────────────────────────────────────────
  const BALL_RADIUS      = 18;
  const RESTITUTION      = 0.72;
  const FRICTION         = 0.985;
  const DAMPING          = 0.999;
  const GRAVITY_STRENGTH = 0.0035;
  const WIN_ACCEL_SCALE  = 0.18;
  const WIN_LOWPASS      = 0.12;
  const MAX_WIN_DELTA    = 40;
  // Timeout oltre il quale si smette di preferire deviceorientationabsolute
  const ABS_EVENT_TIMEOUT_MS = 500;

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const divA          = document.getElementById('div-a');
  const divB          = document.getElementById('div-b');
  const canvas        = document.getElementById('ball-canvas');
  const ctx           = canvas.getContext('2d');
  const overlay       = document.getElementById('permission-overlay');
  const permBtn       = document.getElementById('permission-btn');
  const debugEl       = document.getElementById('debug-info');
  const arrowA        = document.getElementById('gravity-arrow-a');
  const obstaclesLayer = document.getElementById('obstacles-layer');

  if (!ctx) {
    debugEl.textContent = 'Canvas 2D context unavailable.';
    overlay.classList.add('hidden');
    return;
  }

  // ─── Stato mondo ─────────────────────────────────────────────────────────────
  let canvasW = 0, canvasH = 0;
  let lastTime = null;
  let rafId    = null;
  let initialized = false;
  let destroyed   = false;

  // ─── Gravità (px/ms²) ────────────────────────────────────────────────────────
  const gravity = { x: 0, y: GRAVITY_STRENGTH };

  // ─── Palla ───────────────────────────────────────────────────────────────────
  const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: BALL_RADIUS };

  // ─── Sensori ─────────────────────────────────────────────────────────────────
  let rawBeta   = 0;
  let rawGamma  = 0;
  let usingGyro = false;
  let orientationIsAbsolute = false;
  let lastAbsoluteEventTs   = 0;

  // ─── Desktop: movimento finestra ─────────────────────────────────────────────
  let screenAPIAvailable = false;
  try {
    screenAPIAvailable = Number.isFinite(window.screenX) && Number.isFinite(window.screenY);
  } catch (_) { screenAPIAvailable = false; }

  let prevScreenX = screenAPIAvailable ? window.screenX : 0;
  let prevScreenY = screenAPIAvailable ? window.screenY : 0;
  let winVelX = 0, winVelY = 0;

  // ─── Ostacoli ────────────────────────────────────────────────────────────────
  const obstacleSelectors = [];
  let   obstacleRects     = [];
  let   obstaclesDirty    = true;
  const obstacleROMap     = new Map();

  // ═══════════════════════════════════════════════════════════════════════════
  //  DEBUG
  // ═══════════════════════════════════════════════════════════════════════════
  function updateDebug() {
    debugEl.innerHTML =
      `beta (raw): ${rawBeta.toFixed(1)}°<br>` +
      `gamma (raw): ${rawGamma.toFixed(1)}°<br>` +
      `gravity.x: ${gravity.x.toFixed(5)}<br>` +
      `gravity.y: ${gravity.y.toFixed(5)}<br>` +
      `ball vx: ${ball.vx.toFixed(2)} vy: ${ball.vy.toFixed(2)}<br>` +
      `source: ${usingGyro ? '● gyro' : (screenAPIAvailable ? '○ window' : '○ static')}<br>` +
      `absOrientation: ${orientationIsAbsolute}<br>` +
      `v7`;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  CANVAS RESIZE
  // ═══════════════════════════════════════════════════════════════════════════
  function resizeCanvas() {
    const w   = divA.offsetWidth;
    const h   = divA.offsetHeight;
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = Math.max(1, Math.round(w * dpr));
    canvas.height = Math.max(1, Math.round(h * dpr));
    canvas.style.width  = `${w}px`;
    canvas.style.height = `${h}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    canvasW = w;
    canvasH = h;

    ball.x = Math.max(ball.radius, Math.min(canvasW - ball.radius, ball.x || canvasW / 2));
    ball.y = Math.max(ball.radius, Math.min(canvasH - ball.radius, ball.y || canvasH / 4));
    obstaclesDirty = true;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  DIV-B TRANSFORM
  //
  //  div-a è fisso e non ruota mai.
  //  div-b ruota di -deviceAngle (= -rawGamma) per restare allineato
  //  al mondo reale: quando il telefono si inclina a sinistra (gamma < 0),
  //  il box ruota in senso orario sullo schermo, rimanendo "in bolla".
  //  La freccia ↓ all'interno punta sempre verso il basso reale.
  //  coverScale assicura che il box copra sempre div-a nonostante la rotazione.
  // ═══════════════════════════════════════════════════════════════════════════
  function coverScale(containerW, containerH, innerW, innerH, angleRad) {
    const a = Math.abs(Math.cos(angleRad));
    const b = Math.abs(Math.sin(angleRad));
    const scaleX = containerW / (innerW * a + innerH * b);
    const scaleY = containerH / (innerW * b + innerH * a);
    return Math.min(scaleX, scaleY);
  }

  function updateDivBTransform() {
    // Rotazione opposta al tilt del device → box resta allineato al mondo
    const worldAngle = -rawGamma;
    const rad  = worldAngle * Math.PI / 180;
    const aW   = divA.offsetWidth;
    const aH   = divA.offsetHeight;
    const bW   = divB.offsetWidth;
    const bH   = divB.offsetHeight;
    const scale = coverScale(aW, aH, bW, bH, rad);
    divB.style.transform  = `translate(-50%, -50%) rotate(${worldAngle}deg) scale(${scale})`;
    // L'indicatore freccia in basso resta ancorato allo schermo (invariante)
    arrowA.style.transform = `translateX(-50%) rotate(${-worldAngle}deg)`;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITÀ — MOBILE
  //  Formula W3C per proiettare beta/gamma sul piano dello schermo.
  //  Nessun snap: la gravità segue direttamente l'inclinazione del device.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromOrientation(beta, gamma, absolute) {
    rawBeta  = Number.isFinite(beta)  ? beta  : 0;
    rawGamma = Number.isFinite(gamma) ? gamma : 0;
    orientationIsAbsolute = !!absolute;

    const bRad = rawBeta  * Math.PI / 180;
    const gRad = rawGamma * Math.PI / 180;
    const gx = Math.sin(gRad) * GRAVITY_STRENGTH * 20;
    const gy = Math.cos(gRad) * Math.sin(bRad) * GRAVITY_STRENGTH * 20;

    gravity.x = gx;
    gravity.y = gy;

    if (Math.abs(gravity.x) < 0.0001 && Math.abs(gravity.y) < 0.0001) {
      gravity.x = 0;
      gravity.y = GRAVITY_STRENGTH;
    }

    updateDivBTransform();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITÀ — DESKTOP (movimento finestra)
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromWindow() {
    if (!screenAPIAvailable) {
      gravity.x = 0;
      gravity.y = GRAVITY_STRENGTH;
      return;
    }
    const dx = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenX - prevScreenX));
    const dy = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenY - prevScreenY));
    prevScreenX = window.screenX;
    prevScreenY = window.screenY;

    winVelX = winVelX * (1 - WIN_LOWPASS) + dx * WIN_LOWPASS;
    winVelY = winVelY * (1 - WIN_LOWPASS) + dy * WIN_LOWPASS;

    gravity.x = winVelX * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
    gravity.y = GRAVITY_STRENGTH + winVelY * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  SENSOR SETUP
  //  Preferisce deviceorientationabsolute; cade su deviceorientation
  //  se non arriva nessun evento assoluto per ABS_EVENT_TIMEOUT_MS ms.
  // ═══════════════════════════════════════════════════════════════════════════
  function onDeviceOrientationAbsolute(e) {
    usingGyro = true;
    lastAbsoluteEventTs = performance.now();
    updateGravityFromOrientation(e.beta, e.gamma, true);
  }

  function onDeviceOrientation(e) {
    if (performance.now() - lastAbsoluteEventTs <= ABS_EVENT_TIMEOUT_MS) return;
    usingGyro = true;
    updateGravityFromOrientation(e.beta, e.gamma, !!e.absolute);
  }

  function startOrientation() {
    window.addEventListener('deviceorientationabsolute', onDeviceOrientationAbsolute);
    window.addEventListener('deviceorientation', onDeviceOrientation);
  }

  async function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission === 'granted') {
          overlay.classList.add('hidden');
          startOrientation();
        } else {
          overlay.querySelector('p').textContent = 'Permission denied. Tilt controls are unavailable.';
        }
      } catch (_) {
        overlay.querySelector('p').textContent = 'Permission denied. Tilt controls are unavailable.';
      }
    } else {
      overlay.classList.add('hidden');
      startOrientation();
    }
  }

  permBtn.addEventListener('click', requestOrientationPermission);

  if (typeof DeviceOrientationEvent === 'undefined' ||
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    overlay.classList.add('hidden');
    startOrientation();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  OSTACOLI
  //  div-a non ruota → le coordinate schermo degli ostacoli coincidono
  //  con le coordinate locali di div-a, basta sottrarre l'offset di canvas.
  // ═══════════════════════════════════════════════════════════════════════════
  function screenRectToCanvas(rect) {
    const canvasRect = canvas.getBoundingClientRect();
    return {
      x: rect.left - canvasRect.left,
      y: rect.top  - canvasRect.top,
      w: rect.width,
      h: rect.height,
    };
  }

  function observeObstacle(el) {
    if (obstacleROMap.has(el)) return;
    const obs = new ResizeObserver(() => { obstaclesDirty = true; });
    obs.observe(el);
    obstacleROMap.set(el, obs);
  }

  function unobserveObstacle(el) {
    const obs = obstacleROMap.get(el);
    if (!obs) return;
    obs.disconnect();
    obstacleROMap.delete(el);
  }

  function refreshObstacles() {
    if (!obstaclesDirty) return;
    obstaclesDirty = false;
    obstacleRects  = [];

    const elements = new Set();
    for (const sel of obstacleSelectors) {
      document.querySelectorAll(sel).forEach(el => elements.add(el));
    }
    document.querySelectorAll('.obstacle').forEach(el => elements.add(el));

    // Rimuovi observer per elementi non più presenti
    for (const tracked of Array.from(obstacleROMap.keys())) {
      if (!tracked.isConnected || !elements.has(tracked)) unobserveObstacle(tracked);
    }

    for (const el of elements) {
      obstacleRects.push(screenRectToCanvas(el.getBoundingClientRect()));
      observeObstacle(el);
    }
  }

  function addObstacle(cssSelector) {
    if (!obstacleSelectors.includes(cssSelector)) {
      obstacleSelectors.push(cssSelector);
      obstaclesDirty = true;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  FISICA
  // ═══════════════════════════════════════════════════════════════════════════
  function resolveWallCollision() {
    const r = ball.radius;
    if (ball.x - r < 0)       { ball.x = r;            ball.vx =  Math.abs(ball.vx) * RESTITUTION; }
    if (ball.x + r > canvasW) { ball.x = canvasW - r;   ball.vx = -Math.abs(ball.vx) * RESTITUTION; }
    if (ball.y - r < 0)       { ball.y = r;             ball.vy =  Math.abs(ball.vy) * RESTITUTION; }
    if (ball.y + r > canvasH) {
      ball.y  = canvasH - r;
      ball.vy = -Math.abs(ball.vy) * RESTITUTION;
      ball.vx *= FRICTION;
    }
  }

  function resolveObstacleCollisions() {
    for (const obs of obstacleRects) {
      const cx   = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
      const cy   = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
      const dx   = ball.x - cx;
      const dy   = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ball.radius && dist > 0) {
        const pen = ball.radius - dist;
        const nx  = dx / dist;
        const ny  = dy / dist;
        ball.x += nx * pen;
        ball.y += ny * pen;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          ball.vx -= (1 + RESTITUTION) * dot * nx;
          ball.vy -= (1 + RESTITUTION) * dot * ny;
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;
        }
      }
    }
  }

  function updatePhysics(dt) {
    const safeDt = Math.min(dt, 50);
    ball.vx += gravity.x * safeDt;
    ball.vy += gravity.y * safeDt;
    ball.vx *= DAMPING;
    ball.vy *= DAMPING;
    ball.x  += ball.vx * safeDt;
    ball.y  += ball.vy * safeDt;
    resolveWallCollision();
    resolveObstacleCollisions();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  RENDERING
  // ═══════════════════════════════════════════════════════════════════════════
  function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur    = 12;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 4;

    const grad = ctx.createRadialGradient(
      ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
      ball.x, ball.y, ball.radius
    );
    grad.addColorStop(0,   '#a0cfff');
    grad.addColorStop(0.5, '#4f8ef7');
    grad.addColorStop(1,   '#1a3a7a');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    for (const obs of obstacleRects) ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.restore();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  VISIBILITY
  // ═══════════════════════════════════════════════════════════════════════════
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
      lastTime = null;
    } else if (!destroyed && rafId === null) {
      rafId = requestAnimationFrame(loop);
    }
  });

  // ═══════════════════════════════════════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════════════════════════════════════
  function loop(timestamp) {
    if (destroyed) return;
    rafId = requestAnimationFrame(loop);

    if (lastTime === null) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (!usingGyro) updateGravityFromWindow();
    refreshObstacles();
    updatePhysics(dt);
    render();
    updateDebug();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  RESIZE OBSERVER
  // ═══════════════════════════════════════════════════════════════════════════
  const layoutRO = new ResizeObserver(() => {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;
    if (w === 0 || h === 0) return;
    resizeCanvas();
    if (!initialized) init();
  });
  layoutRO.observe(divA);

  // ═══════════════════════════════════════════════════════════════════════════
  //  MUTATION OBSERVER ostacoli
  // ═══════════════════════════════════════════════════════════════════════════
  const obstacleMO = new MutationObserver((mutations) => {
    let changed = false;
    for (const m of mutations) {
      m.removedNodes.forEach((node) => {
        if (node.nodeType !== 1) return;
        if (node.matches?.('.obstacle')) { unobserveObstacle(node); changed = true; }
        node.querySelectorAll?.('.obstacle').forEach((el) => unobserveObstacle(el));
      });
      m.addedNodes.forEach((node) => {
        if (node.nodeType !== 1) return;
        if (node.matches?.('.obstacle') || node.querySelectorAll?.('.obstacle').length) changed = true;
      });
    }
    if (changed) obstaclesDirty = true;
  });
  obstacleMO.observe(obstaclesLayer, { childList: true, subtree: true });

  // ═══════════════════════════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════════════════════════
  function init() {
    if (initialized || destroyed) return;
    initialized = true;
    resizeCanvas();
    ball.x  = canvasW / 2;
    ball.y  = canvasH / 4;
    ball.vx = 1.5;
    ball.vy = 0;
    rafId = requestAnimationFrame(loop);
  }

  // Fallback se ResizeObserver non parte (es. display:none all'avvio)
  setTimeout(init, 100);

  // ═══════════════════════════════════════════════════════════════════════════
  //  CLEANUP
  // ═══════════════════════════════════════════════════════════════════════════
  function destroy() {
    destroyed = true;
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    layoutRO.disconnect();
    obstacleMO.disconnect();
    for (const obs of obstacleROMap.values()) obs.disconnect();
    obstacleROMap.clear();
    window.removeEventListener('deviceorientationabsolute', onDeviceOrientationAbsolute);
    window.removeEventListener('deviceorientation', onDeviceOrientation);
  }

  window.addEventListener('pagehide', destroy, { once: true });

  // ═══════════════════════════════════════════════════════════════════════════
  //  PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════════
  window.physicsApp = {
    addObstacle,
    getBall:  () => ({ ...ball }),
    stop:     () => { if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; } lastTime = null; },
    start:    () => { if (!destroyed && rafId === null) { lastTime = null; rafId = requestAnimationFrame(loop); } },
    destroy,
  };

})();
</script>
</body>
</html>
