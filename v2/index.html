<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Ball</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0f0f0f;
  }

  /*
   * DIV A — full-viewport fixed container.
   * Snaps to 0/90/180/270° to match device orientation.
   * All interactive children (canvas, obstacles) live here.
   */
  #div-a {
    position: fixed;
    inset: 0;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /*
   * DIV B — purely decorative rotating rectangle, child of div-a.
   * Rotates continuously at relAngle = deviceAngle - snapAngle.
   * Scaled so its edges are always exactly 20px inside div-a on every side.
   * No physics involvement — pointer-events disabled.
   */
  #div-b {
    position: absolute;
    top: 50%; left: 50%;
    translate: -50% -50%;
    /* Natural size = div-a minus 40px each axis (20px per side).
       JS coverScale then ensures it always fills div-a - 20px gap when rotated. */
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    transform-origin: center center;
     color:white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 100px;
    pointer-events: none;
  }

  /*
   * BALL CANVAS — fills div-a completely.
   * Physics coordinate space = div-a space.
   */
  #ball-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 10;
  }

  /*
   * OBSTACLES LAYER — axis-aligned in div-a space.
   * Snaps with div-a, never follows div-b's continuous rotation.
   */
  #obstacles-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  /* Counter-rotates inside div-a to always point world-down */
  #gravity-arrow-a {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color:white;
    user-select: none;
    pointer-events: none;
    z-index: 30;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* iOS permission overlay */
  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    color: white;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 24px;
  }
  #permission-overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #permission-btn {
    padding: 12px 32px;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
  }
  #permission-overlay.hidden { display: none; }

  /*
   * Debug panel — extended for diagnostics.
   * Shows raw sensor values, projected gravity, snap state.
   */
  #debug-info {
    position: fixed;
    top: 8px; left: 8px;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    z-index: 200;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 6px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <p>This experience needs access to device orientation sensors.</p>
  <button id="permission-btn">Enable Motion</button>
</div>

<!--
  DIV A — snapped coordinate frame (0/90/180/270°).
  Everything that participates in physics lives here.
-->
<div id="div-a">

  <!--
    DIV B — decorative only, rotates continuously inside div-a.
    Purely visual — no physics interaction.
  -->
  <div id="div-b">↓</div>

  <!-- Ball physics rendered here — coordinate space = div-a -->
  <canvas id="ball-canvas"></canvas>

  <!--
    OBSTACLES LAYER — DOM elements here act as physics obstacles.
    They are axis-aligned in div-a space (snap with div-a, not div-b).
    Add .obstacle children to define collidable areas.
  -->
  <div id="obstacles-layer">
    <!-- Demo obstacle — remove or replace -->
    <div class="obstacle" style="
      position:absolute; left:20%; top:40%;
      width:60%; height:12px;
      background: rgba(255,255,255,0.12);
      border-radius:6px;
    "></div>
  </div>

  <!-- Arrow that counter-rotates inside div-a to always point world-down -->
  <div id="gravity-arrow-a">↓</div>
</div>

<div id="debug-info">waiting for sensor…</div>

<script>
(function() {
  'use strict';

  // ─── Physics constants ───────────────────────────────────────────────────────
  const BALL_RADIUS       = 18;
  const RESTITUTION       = 0.72;
  const FRICTION          = 0.985;
  const DAMPING           = 0.999;
  const GRAVITY_STRENGTH  = 0.0035;
  const WIN_ACCEL_SCALE   = 0.18;
  const WIN_LOWPASS       = 0.12;
  const MAX_WIN_DELTA     = 40;

  // ─── Snap constants ──────────────────────────────────────────────────────────
  const SNAP_ENTER_DEG    = 80;
  const SNAP_HYSTERESIS   = 12;

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const divA      = document.getElementById('div-a');
  const divB      = document.getElementById('div-b');
  const canvas    = document.getElementById('ball-canvas');
  const ctx       = canvas.getContext('2d');
  const overlay   = document.getElementById('permission-overlay');
  const permBtn   = document.getElementById('permission-btn');
  const debugEl   = document.getElementById('debug-info');
  const arrowA    = document.getElementById('gravity-arrow-a');

  // ─── World dimensions ────────────────────────────────────────────────────────
  let canvasW = 0, canvasH = 0;

  // ─── Gravity in div-a space (px/ms²) ────────────────────────────────────────
  const gravity = { x: 0, y: GRAVITY_STRENGTH };

  // ─── Ball state ──────────────────────────────────────────────────────────────
  const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: BALL_RADIUS };

  // ─── Orientation state ───────────────────────────────────────────────────────
  let rawBeta     = 0;   // raw beta from sensor (degrees)
  let rawGamma    = 0;   // raw gamma from sensor (degrees)
  let deviceAngle = 0;   // angle used for snap logic (= gamma)
  let snapAngle   = 0;   // current div-a snap: 0 / 90 / 180 / 270
  let usingGyro   = false;

  // ─── Desktop window movement state ──────────────────────────────────────────
  let prevScreenX = window.screenX;
  let prevScreenY = window.screenY;
  let winVelX = 0, winVelY = 0;

  // ─── Obstacles ───────────────────────────────────────────────────────────────
  const obstacleSelectors = [];
  let   obstacleRects     = [];


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEBUG PANEL
  //  Updated every frame with raw sensor data + computed state.
  //  Remove or comment out updateDebug() call in loop() for production.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateDebug() {
    debugEl.innerHTML =
      `beta (raw): ${rawBeta.toFixed(1)}°<br>` +
      `gamma (raw): ${rawGamma.toFixed(1)}°<br>` +
      `deviceAngle: ${deviceAngle.toFixed(1)}°<br>` +
      `snapAngle: ${snapAngle}°<br>` +
      `gravity.x: ${gravity.x.toFixed(5)}<br>` +
      `gravity.y: ${gravity.y.toFixed(5)}<br>` +
      `ball vx: ${ball.vx.toFixed(2)} vy: ${ball.vy.toFixed(2)}<br>` +
      `source: ${usingGyro ? '● gyro' : '○ window'}`+`<br> versione 3` ;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  CANVAS RESIZE
  //  Uses offsetWidth/offsetHeight (layout size, transform-independent).
  //  getBoundingClientRect() would return post-transform size — wrong on Chrome
  //  when a CSS transform is already applied at the time of the call.
  // ═══════════════════════════════════════════════════════════════════════════
  function resizeCanvas() {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;

    const dpr = window.devicePixelRatio || 1;
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);

    canvasW = w;
    canvasH = h;

    ball.x = Math.max(ball.radius, Math.min(canvasW - ball.radius, ball.x || canvasW / 2));
    ball.y = Math.max(ball.radius, Math.min(canvasH - ball.radius, ball.y || canvasH / 4));
  }

  const ro = new ResizeObserver(resizeCanvas);
  ro.observe(divA);


  // ═══════════════════════════════════════════════════════════════════════════
  //  DIV B TRANSFORM
  //  div-b rotates at relAngle = deviceAngle - snapAngle (relative to div-a).
  //  Scaled so its visible boundary sits 20px inside div-a on every side.
  //
  //  Strategy: div-b natural size is (divA - 40px) each axis.
  //  coverScale computes the minimum scale to ensure no gap appears at the
  //  corners when rotated — but we want the OPPOSITE: we want it to always
  //  show a 20px gap. So we use fit (min) scale, which keeps it within bounds,
  //  and the natural size already encodes the 40px reduction.
  //  When rotated, the bounding box shrinks, so the gap increases slightly —
  //  this is visually acceptable and avoids the complexity of a dynamic inset.
  // ═══════════════════════════════════════════════════════════════════════════
  function coverScale(containerW, containerH, innerW, innerH, angleRad) {
    // Scale so rotated innerW×innerH always fits inside container (no overflow).
    // Uses the rotated bounding box formula.
    const a = Math.abs(Math.cos(angleRad));
    const b = Math.abs(Math.sin(angleRad));
    const scaleX = containerW / (innerW * a + innerH * b);
    const scaleY = containerH / (innerW * b + innerH * a);
    return Math.min(scaleX, scaleY);
  }

  function updateDivBTransform() {
    const relAngle = deviceAngle - snapAngle;
    const relRad   = relAngle * Math.PI / 180;

    // Layout dimensions — unaffected by CSS transform
    const aW = divA.offsetWidth;
    const aH = divA.offsetHeight;
    const bW = divB.offsetWidth;
    const bH = divB.offsetHeight;

    const scale = coverScale(aW, aH, bW, bH, relRad);
    divB.style.transform = `rotate(${relAngle}deg) scale(${scale})`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  SNAP LOGIC
  // ═══════════════════════════════════════════════════════════════════════════
  function computeSnapAngle(rawAngle, currentSnap) {
  const norm        = ((rawAngle    % 360) + 360) % 360;
  const normCurrent = ((currentSnap % 360) + 360) % 360;

  // Distance from current snap — must exceed EXIT threshold before
  // we even consider switching to another snap target
  const distFromCurrent = Math.abs(((norm - normCurrent + 540) % 360) - 180);
  if (distFromCurrent < SNAP_ENTER_DEG) {
    // Still well within the current snap zone — don't change
    return currentSnap;
  }

  // We've left the current snap zone — find the nearest new target
  let bestSnap = currentSnap;
  let bestDist = Infinity;
  for (const snap of [0, 90, 180, 270]) {
    if (snap === normCurrent) continue;
    const dist = Math.abs(((norm - snap + 540) % 360) - 180);
    if (dist < SNAP_ENTER_DEG - SNAP_HYSTERESIS && dist < bestDist) {
      bestDist = dist;
      bestSnap = snap;
    }
  }
  return bestSnap;
}

  function applySnapAngle(newSnap) {
    if (newSnap === snapAngle) return;

    const delta = newSnap - snapAngle;
    const rad   = -delta * Math.PI / 180;
    const cos   = Math.cos(rad);
    const sin   = Math.sin(rad);

    // Counter-rotate velocity so ball trajectory feels continuous across snap
    const newVx = ball.vx * cos - ball.vy * sin;
    const newVy = ball.vx * sin + ball.vy * cos;
    ball.vx = newVx;
    ball.vy = newVy;

    // Rotate position around canvas center so ball stays at same world location
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const px  = ball.x - cx;
    const py  = ball.y - cy;
    ball.x = px * cos - py * sin + cx;
    ball.y = px * sin + py * cos + cy;

    snapAngle = newSnap;

    divA.style.transform  = `rotate(${snapAngle}deg)`;
    // Arrow lives inside div-a and must counter-rotate to point world-down
    arrowA.style.transform = `translateX(-50%) rotate(${-snapAngle}deg)`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — MOBILE (device orientation)
  //
  //  In portrait mode, beta ≈ 90° (device nearly vertical).
  //  We use (beta - 90) as the tilt reference so that:
  //    - phone perfectly upright portrait → betaOffset = 0 → no Y gravity component
  //    - tilting top toward user → betaOffset > 0 → ball rolls toward top
  //    - tilting top away → betaOffset < 0 → ball rolls toward bottom
  //
  //  World-frame gravity is then projected into div-a's coordinate frame
  //  by rotating by -snapAngle, ensuring physical continuity across snaps.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromOrientation(beta, gamma) {
    rawBeta     = beta  || 0;
    rawGamma    = gamma || 0;
    deviceAngle = rawGamma;

    // Portrait reference: beta=90 is upright. Offset so 0 = neutral.
    const betaOffset = Math.max(-90, Math.min(90, rawBeta - 90));
    const bRad = betaOffset * Math.PI / 180;
    const gRad = Math.max(-90, Math.min(90, rawGamma)) * Math.PI / 180;

    // World-frame gravity (what the physical device experiences)
    const worldGx =  Math.sin(gRad) * GRAVITY_STRENGTH * 20;
    const worldGy =  Math.sin(bRad) * GRAVITY_STRENGTH * 20;

    // Project into div-a frame by rotating by -snapAngle
    const snapRad = -snapAngle * Math.PI / 180;
    const cos     = Math.cos(snapRad);
    const sin     = Math.sin(snapRad);
    gravity.x = worldGx * cos - worldGy * sin;
    gravity.y = worldGx * sin + worldGy * cos;

    // Minimum gravity when device nearly flat
    if (Math.abs(gravity.x) < 0.0001 && Math.abs(gravity.y) < 0.0001) {
      gravity.y = GRAVITY_STRENGTH;
    }

    const newSnap = computeSnapAngle(deviceAngle, snapAngle);
    applySnapAngle(newSnap);
    updateDivBTransform();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — DESKTOP (window movement)
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromWindow() {
    const dx = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenX - prevScreenX));
    const dy = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenY - prevScreenY));
    prevScreenX = window.screenX;
    prevScreenY = window.screenY;

    winVelX = winVelX * (1 - WIN_LOWPASS) + dx * WIN_LOWPASS;
    winVelY = winVelY * (1 - WIN_LOWPASS) + dy * WIN_LOWPASS;

    gravity.x = winVelX * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
    gravity.y = GRAVITY_STRENGTH + winVelY * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEVICE ORIENTATION SETUP
  // ═══════════════════════════════════════════════════════════════════════════
  function startOrientation() {
    window.addEventListener('deviceorientation', (e) => {
      usingGyro = true;
      updateGravityFromOrientation(e.beta, e.gamma);
    });
  }

  permBtn.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          overlay.classList.add('hidden');
          startOrientation();
        }
      } catch(e) {
        overlay.querySelector('p').textContent = "Permission denied. Tilt won't work.";
      }
    } else {
      overlay.classList.add('hidden');
      startOrientation();
    }
  });

  if (typeof DeviceOrientationEvent === 'undefined' ||
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    overlay.classList.add('hidden');
    startOrientation();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  OBSTACLES
  // ═══════════════════════════════════════════════════════════════════════════
  function addObstacle(cssSelector) {
    if (!obstacleSelectors.includes(cssSelector)) obstacleSelectors.push(cssSelector);
  }

  function refreshObstacles() {
    const canvasRect = canvas.getBoundingClientRect();
    obstacleRects = [];

    for (const sel of obstacleSelectors) {
      document.querySelectorAll(sel).forEach(el => {
        const r = el.getBoundingClientRect();
        obstacleRects.push({ x: r.left - canvasRect.left, y: r.top - canvasRect.top, w: r.width, h: r.height });
      });
    }

    document.querySelectorAll('.obstacle').forEach(el => {
      const r = el.getBoundingClientRect();
      obstacleRects.push({ x: r.left - canvasRect.left, y: r.top - canvasRect.top, w: r.width, h: r.height });
    });
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  PHYSICS
  // ═══════════════════════════════════════════════════════════════════════════
  function resolveWallCollision() {
    const r = ball.radius;
    if (ball.x - r < 0)       { ball.x = r;          ball.vx =  Math.abs(ball.vx) * RESTITUTION; }
    if (ball.x + r > canvasW) { ball.x = canvasW - r; ball.vx = -Math.abs(ball.vx) * RESTITUTION; }
    if (ball.y - r < 0)       { ball.y = r;           ball.vy =  Math.abs(ball.vy) * RESTITUTION; }
    if (ball.y + r > canvasH) {
      ball.y  = canvasH - r;
      ball.vy = -Math.abs(ball.vy) * RESTITUTION;
      ball.vx *= FRICTION;
    }
  }

  function resolveObstacleCollisions() {
    for (const obs of obstacleRects) {
      const cx   = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
      const cy   = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
      const dx   = ball.x - cx;
      const dy   = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ball.radius && dist > 0) {
        const pen = ball.radius - dist;
        const nx  = dx / dist;
        const ny  = dy / dist;
        ball.x += nx * pen;
        ball.y += ny * pen;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          ball.vx -= (1 + RESTITUTION) * dot * nx;
          ball.vy -= (1 + RESTITUTION) * dot * ny;
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;
        }
      }
    }
  }

  function updatePhysics(dt) {
    const safeDt = Math.min(dt, 32);
    ball.vx += gravity.x * safeDt;
    ball.vy += gravity.y * safeDt;
    ball.vx *= DAMPING;
    ball.vy *= DAMPING;
    ball.x  += ball.vx * safeDt;
    ball.y  += ball.vy * safeDt;
    resolveWallCollision();
    resolveObstacleCollisions();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  RENDERING
  // ═══════════════════════════════════════════════════════════════════════════
  function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur    = 12;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 4;

    const grad = ctx.createRadialGradient(
      ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
      ball.x, ball.y, ball.radius
    );
    grad.addColorStop(0, '#a0cfff');
    grad.addColorStop(0.5, '#4f8ef7');
    grad.addColorStop(1, '#1a3a7a');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Obstacle debug outlines
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    for (const obs of obstacleRects) ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.restore();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════════════════════════════════════
  let lastTime   = null;
  let frameCount = 0;

  function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime  = timestamp;

    if (!usingGyro) updateGravityFromWindow();
    if (frameCount % 10 === 0) refreshObstacles();
    frameCount++;

    updatePhysics(dt);
    render();
    updateDebug();

    requestAnimationFrame(loop);
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════════════════════════
  function init() {
    resizeCanvas();
    ball.x  = canvasW / 2;
    ball.y  = canvasH / 4;
    ball.vx = 1.5;
    ball.vy = 0;
    requestAnimationFrame(loop);
  }

  setTimeout(init, 50);


  // ═══════════════════════════════════════════════════════════════════════════
  //  PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════════
  window.physicsApp = {
    addObstacle,
    getBall: () => ({ ...ball }),
  };

})();
</script>
</body>
</html>
