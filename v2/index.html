<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bouncing Ball</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: #0d0d0d;
      font-family: system-ui, sans-serif;
    }

    #world {
      position: relative;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
    }

    canvas#physicsCanvas {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 1;
    }

    .obstacle {
      position: absolute;
      background: #3a6ea5;
      border-radius: 6px;
      z-index: 2;
      pointer-events: auto;
    }

    #permBtn {
      background: #e03030;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(224,48,48,0.35);
    }
    #permBtn:hover { background: #c02020; }
    #permBtn:active { transform: translateY(1px); }

    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: .78rem;
      min-width: 200px;
      user-select: none;
    }
    #controls summary {
      cursor: pointer;
      font-weight: 700;
      font-size: .85rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controls summary::before { content: '⚙️'; }
    #controls .ctrl-body { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-row { display: flex; flex-direction: column; gap: 2px; }
    .ctrl-row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .ctrl-row label span { opacity: .75; }
    .ctrl-row label strong { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .ctrl-row input[type=range] {
      width: 100%;
      accent-color: #e03030;
      cursor: pointer;
    }
    #resetBtn {
      margin-top: 4px;
      width: 100%;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: .78rem;
    }
    #resetBtn:hover { background: rgba(255,255,255,.1); }
  </style>
</head>
<body>

<div id="world">
  <canvas id="physicsCanvas"></canvas>
  <button id="permBtn" class="obstacle" style="left:50%;bottom:20%;transform:translateX(-50%);">
    🔄 Abilita sensori
  </button>
</div>

<details id="controls" open>
  <summary>Fisica</summary>
  <div class="ctrl-body">
    <div class="ctrl-row">
      <label><span>Gravità</span><strong id="valGravity">980</strong></label>
      <input type="range" id="slGravity" min="100" max="3000" step="10" value="980" />
    </div>
    <div class="ctrl-row">
      <label><span>Rimbalzo</span><strong id="valRestitution">0.72</strong></label>
      <input type="range" id="slRestitution" min="0" max="1" step="0.01" value="0.72" />
    </div>
    <div class="ctrl-row">
      <label><span>Attrito</span><strong id="valFriction">0.985</strong></label>
      <input type="range" id="slFriction" min="0.8" max="1" step="0.001" value="0.985" />
    </div>
    <div class="ctrl-row">
      <label><span>Raggio pallina</span><strong id="valRadius">22</strong></label>
      <input type="range" id="slRadius" min="8" max="80" step="1" value="22" />
    </div>
    <button id="resetBtn">↺ Reimposta pallina</button>
  </div>
</details>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const CFG = {
  gravity:     980,
  restitution: 0.72,
  friction:    0.985,
  radius:      22,
};

// ─── Gravity vector ─────────────────────────────────────────────────────────
const gVec = { x: 0, y: 1 };

// ─── Ball state — normalized screen-space [0..1] ───────────────────────────
const ball = { nx: 0.5, ny: 0.25, nvx: 0, nvy: 0 };

// ─── Obstacles ─────────────────────────────────────────────────────────────
let obstacles = [];

// ─── Canvas / world ────────────────────────────────────────────────────────
const canvas = document.getElementById('physicsCanvas');
const ctx    = canvas.getContext('2d');
const world  = document.getElementById('world');
let W = 0, H = 0;

let lastOrientAngle = getOrientAngle();

function getOrientAngle() {
  if (screen.orientation && screen.orientation.angle !== undefined)
    return screen.orientation.angle;
  return typeof window.orientation === 'number' ? Math.abs(window.orientation) : 0;
}

function onResize() {
  const newAngle = getOrientAngle();
  const rotated = newAngle !== lastOrientAngle;

  const r = world.getBoundingClientRect();
  const newW = r.width;
  const newH = r.height;

  if (rotated) {
    const delta = ((newAngle - lastOrientAngle) + 360) % 360;
    const cx = 0.5, cy = 0.5;
    const dx = ball.nx - cx;
    const dy = ball.ny - cy;

    let newNx, newNy, newNvx, newNvy;

    if (delta === 90) {
  // Da old a old+90° (CW)
  newNx  =  1 - ball.ny;
  newNy  =  ball.nx;
  newNvx =  ball.nvy;
  newNvy = -ball.nvx;
} else if (delta === 270) {
  // Da old a old+270° (CCW)
  newNx  =  ball.ny;
  newNy  =  1 - ball.nx;
  newNvx = -ball.nvy;
  newNvy =  ball.nvx;
} else if (delta === 180) {
  // 180°
  newNx  =  1 - ball.nx;
  newNy  =  1 - ball.ny;
  newNvx = -ball.nvx;
  newNvy = -ball.nvy;
}
    ball.nx  = Math.min(Math.max(newNx,  0), 1);
    ball.ny  = Math.min(Math.max(newNy,  0), 1);
    ball.nvx = newNvx;
    ball.nvy = newNvy;

    lastOrientAngle = newAngle;
  }

  W = canvas.width  = newW;
  H = canvas.height = newH;

  refreshObstacles();
}

// ─── Obstacle registration ─────────────────────────────────────────────────
function registerObstacles(selectors = ['.obstacle']) {
  obstacles = [];
  const wr = world.getBoundingClientRect();
  selectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      const rect = el.getBoundingClientRect();
      obstacles.push({
        nx: (rect.left - wr.left) / wr.width,
        ny: (rect.top  - wr.top)  / wr.height,
        nw: rect.width  / wr.width,
        nh: rect.height / wr.height,
      });
    });
  });
}
function refreshObstacles() { registerObstacles(); }

// ─── Physics — fixed timestep ──────────────────────────────────────────────
const FIXED_DT  = 1 / 120;
const MAX_ACCUM = FIXED_DT * 8;
let   accumulator = 0;
let   lastTime    = null;

function normRadius() {
  return (H > 0) ? CFG.radius / H : 0;
}

function physicsStep(dt) {
  const nr = normRadius();
  const gn = CFG.gravity / H;

  ball.nvx += gVec.x * gn * dt;
  ball.nvy += gVec.y * gn * dt;

  ball.nvx *= CFG.friction;
  ball.nvy *= CFG.friction;

  ball.nx += ball.nvx * dt;
  ball.ny += ball.nvy * dt;

  const nrX = nr * (H / W);

  // Wall collisions
  if (ball.nx - nrX < 0) {
    ball.nx  = nrX;
    ball.nvx = Math.abs(ball.nvx) * CFG.restitution;
  } else if (ball.nx + nrX > 1) {
    ball.nx  = 1 - nrX;
    ball.nvx = -Math.abs(ball.nvx) * CFG.restitution;
  }
  if (ball.ny - nr < 0) {
    ball.ny  = nr;
    ball.nvy = Math.abs(ball.nvy) * CFG.restitution;
  } else if (ball.ny + nr > 1) {
    ball.ny  = 1 - nr;
    ball.nvy = -Math.abs(ball.nvy) * CFG.restitution;
  }

  // Obstacles
  for (const ob of obstacles) {
    resolveAABB(ob, nr, nrX);
  }
}

function resolveAABB(ob, nr, nrX) {
  const bx = ball.nx * W;
  const by = ball.ny * H;
  const r  = CFG.radius;

  const ox = ob.nx * W;
  const oy = ob.ny * H;
  const ow = ob.nw * W;
  const oh = ob.nh * H;

  const clampX = Math.max(ox, Math.min(bx, ox + ow));
  const clampY = Math.max(oy, Math.min(by, oy + oh));
  const dx = bx - clampX;
  const dy = by - clampY;
  const dist2 = dx * dx + dy * dy;
  if (dist2 >= r * r) return;

  const dist  = Math.sqrt(dist2) || 0.001;
  const nx_   = dx / dist;
  const ny_   = dy / dist;
  const pen   = r - dist;

  ball.nx += (nx_ * pen) / W;
  ball.ny += (ny_ * pen) / H;

  const pvx = ball.nvx * W;
  const pvy = ball.nvy * H;
  const dot = pvx * nx_ + pvy * ny_;
  if (dot < 0) {
    const newPvx = pvx - (1 + CFG.restitution) * dot * nx_;
    const newPvy = pvy - (1 + CFG.restitution) * dot * ny_;
    ball.nvx = newPvx / W;
    ball.nvy = newPvy / H;
  }
}

// ─── Render ────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  const px = ball.nx * W;
  const py = ball.ny * H;
  const r  = CFG.radius;

  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = '#e03030';
  ctx.fill();

  const grad = ctx.createRadialGradient(
    px - r * 0.3, py - r * 0.35, r * 0.05,
    px, py, r
  );
  grad.addColorStop(0, 'rgba(255,255,255,0.45)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ─── Main loop ─────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) { lastTime = ts; }
  let raw = Math.min((ts - lastTime) / 1000, MAX_ACCUM);
  lastTime = ts;
  accumulator += raw;
  while (accumulator >= FIXED_DT) {
    physicsStep(FIXED_DT);
    accumulator -= FIXED_DT;
  }
  render();
}

// ─── Device Orientation ────────────────────────────────────────────────────
function onOrientation(e) {
  const beta  = e.beta  ?? 0;
  const gamma = e.gamma ?? 0;
  const angle = getOrientAngle();

  // Mapping corretto per il tuo device (da debug)
  switch (angle) {
    case 0:
      gVec.x =  beta  / 90;
      gVec.y = -gamma / 90;
      break;
    case 90:
      gVec.x =  gamma / 90;
      gVec.y =  beta  / 90;
      break;
    case 270:
      gVec.x = -gamma / 90;
      gVec.y = -beta  / 90;
      break;
    case 180:
      gVec.x = -beta  / 90;
      gVec.y =  gamma / 90;
      break;
    default:
      gVec.x =  beta  / 90;
      gVec.y =  gamma / 90;
  }

  gVec.x = Math.max(-1, Math.min(1, gVec.x));
  gVec.y = Math.max(-1, Math.min(1, gVec.y));
}

function startOrientation() {
  window.addEventListener('deviceorientation', onOrientation);
}

function setupOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+: mostra il pulsante
    const btn = document.getElementById('permBtn');
    btn.style.display = 'inline-block';

    btn.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => {
          if (state === 'granted') {
            startOrientation();
            // Rimuovi pulsante come ostacolo
            btn.classList.remove('obstacle');
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
            refreshObstacles();
          } else {
            alert('Permesso negato: la gravità sarà fissa');
          }
        })
        .catch(() => {
          alert('Errore nel permesso');
        });
    });
  } else if (window.DeviceOrientationEvent) {
    startOrientation();
  }
}

// ─── Sliders ───────────────────────────────────────────────────────────────
function bindSlider(id, valId, key) {
  const sl  = document.getElementById(id);
  const lbl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    CFG[key] = +sl.value;
    lbl.textContent = sl.value;
  });
}
bindSlider('slGravity',     'valGravity',     'gravity');
bindSlider('slRestitution', 'valRestitution', 'restitution');
bindSlider('slFriction',    'valFriction',    'friction');
bindSlider('slRadius',      'valRadius',      'radius');

document.getElementById('resetBtn').addEventListener('click', () => {
  ball.nx = 0.5; ball.ny = 0.25;
  ball.nvx = 0;  ball.nvy = 0;
});

// ─── Init ──────────────────────────────────────────────────────────────────
if (screen.orientation) {
  screen.orientation.addEventListener('change', onResize);
}
window.addEventListener('orientationchange', onResize);
const ro = new ResizeObserver(onResize);
ro.observe(world);

onResize();
setupOrientation();
refreshObstacles();
requestAnimationFrame(loop);
</script>
</body>
</html>
