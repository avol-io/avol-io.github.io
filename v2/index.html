<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bouncing Ball</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: #0d0d0d;
      font-family: system-ui, sans-serif;
    }

    #world {
      position: relative;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
    }

    canvas#physicsCanvas {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 1;
    }

    .obstacle {
      position: absolute;
      background: #3a6ea5;
      border-radius: 6px;
      z-index: 2;
      pointer-events: auto;
    }

    #permBtn {
      position: absolute;
      left: 50%;
      bottom: 20%;
      transform: translateX(-50%);
      background: #e03030;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(224,48,48,0.35);
      z-index: 3;
    }
    #permBtn:hover { background: #c02020; }
    #permBtn:active { transform: translateX(-50%) translateY(1px); }

    /* ── Physics controls ───────────────────────── */
    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: .78rem;
      min-width: 200px;
      user-select: none;
    }
    #controls summary {
      cursor: pointer;
      font-weight: 700;
      font-size: .85rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controls summary::before { content: '⚙️'; }
    #controls .ctrl-body { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-row { display: flex; flex-direction: column; gap: 2px; }
    .ctrl-row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .ctrl-row label span { opacity: .75; }
    .ctrl-row label strong { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .ctrl-row input[type=range] {
      width: 100%;
      accent-color: #e03030;
      cursor: pointer;
    }
    #resetBtn {
      margin-top: 4px;
      width: 100%;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: .78rem;
    }
    #resetBtn:hover { background: rgba(255,255,255,.1); }

    /* ── Debug / Calibration panel ──────────────── */
    #calib {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 50;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      font-size: .76rem;
      width: 248px;
      user-select: none;
    }

    #calibOrient {
      font-weight: 700;
      font-size: .8rem;
      margin-bottom: 1px;
    }

    #calibSensorVals {
      font-size: .68rem;
      opacity: .55;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
      letter-spacing: .02em;
    }

    /* Two arrow canvases side by side */
    .arrows-row {
      display: flex;
      gap: 8px;
      justify-content: space-around;
      margin-bottom: 8px;
    }

    .arrow-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .arrow-label {
      font-size: .63rem;
      opacity: .65;
      text-align: center;
      line-height: 1.2;
    }

    .arrow-canvas {
      border-radius: 50%;
      display: block;
    }

    #calibText {
      font-size: .7rem;
      opacity: .75;
      text-align: center;
      margin-bottom: 8px;
    }

    /* Wizard */
    #calibWizard {
      display: none;
      background: rgba(255,255,255,.06);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: .74rem;
      text-align: center;
      line-height: 1.4;
    }

    .wiz-icon { font-size: 1.5rem; margin-bottom: 3px; }

    .wiz-bar {
      margin-top: 7px;
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .wiz-bar-fill {
      height: 100%;
      background: #e03030;
      width: 0%;
      border-radius: 4px;
    }

    .wiz-done { color: #4caf50; font-weight: 700; font-size: .8rem; }
    .wiz-warn { color: #e5a020; font-weight: 700; }

    /* Buttons */
    #calibBtns {
      display: flex;
      gap: 6px;
    }

    #calib button {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: .72rem;
      transition: background .15s;
    }
    #calib button:hover:not(:disabled) { background: rgba(255,255,255,.1); }
    #calib button:disabled { opacity: .35; cursor: default; }
    #calibStart { border-color: rgba(224,48,48,.45) !important; }
    #calibStart:hover:not(:disabled) { background: rgba(224,48,48,.18) !important; }
  </style>
</head>
<body>

<div id="world">
  <canvas id="physicsCanvas"></canvas>
  <button id="permBtn" class="obstacle">🔄 Abilita sensori</button>
</div>

<!-- ── Debug panel ─────────────────────────── -->
<div id="calib">
  <div id="calibOrient">Orientamento: —</div>
  <div id="calibSensorVals">β —°  γ —°</div>

  <div class="arrows-row">
    <div class="arrow-cell">
      <div class="arrow-label">📡 Grezzo<br>(W3C)</div>
      <canvas class="arrow-canvas" id="arrowRaw" width="58" height="58"></canvas>
    </div>
    <div class="arrow-cell">
      <div class="arrow-label">⚽ Calibrato<br>(gVec)</div>
      <canvas class="arrow-canvas" id="arrowCal" width="58" height="58"></canvas>
    </div>
    <div class="arrow-cell">
      <div class="arrow-label">🧭 Solo γ<br>(fisico L/R)</div>
      <canvas class="arrow-canvas" id="arrowGamma" width="58" height="58"></canvas>
    </div>
  </div>

  <div id="calibText">Calibrazione: neutra</div>
  <div id="calibWizard"></div>

  <div id="calibBtns">
    <button id="calibReset">↺ Reset</button>
    <button id="calibStart">🎯 Ricalibra</button>
  </div>
</div>

<!-- ── Physics controls ───────────────────── -->
<details id="controls" open>
  <summary>Fisica</summary>
  <div class="ctrl-body">
    <div class="ctrl-row">
      <label><span>Gravità</span><strong id="valGravity">980</strong></label>
      <input type="range" id="slGravity" min="100" max="3000" step="10" value="980" />
    </div>
    <div class="ctrl-row">
      <label><span>Rimbalzo</span><strong id="valRestitution">0.72</strong></label>
      <input type="range" id="slRestitution" min="0" max="1" step="0.01" value="0.72" />
    </div>
    <div class="ctrl-row">
      <label><span>Attrito</span><strong id="valFriction">0.985</strong></label>
      <input type="range" id="slFriction" min="0.8" max="1" step="0.001" value="0.985" />
    </div>
    <div class="ctrl-row">
      <label><span>Raggio pallina</span><strong id="valRadius">22</strong></label>
      <input type="range" id="slRadius" min="8" max="80" step="1" value="22" />
    </div>
    <button id="resetBtn">↺ Reimposta pallina</button>
  </div>
</details>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const CFG = { gravity: 980, restitution: 0.72, friction: 0.985, radius: 22 };
const LS_KEY = 'ball-gravity-calibration-v1';
const DEFAULT_CAL = { xSign: 1, ySign: 1, swapXY: false };

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let CAL = loadCalibration();
const gVec = { x: 0, y: 1 };
const ball = { nx: 0.5, ny: 0.25, nvx: 0, nvy: 0 };
let obstacles = [];
let W = 0, H = 0;
let lastOrientAngle = getOrientAngle();

let rawBeta  = 0;   // last raw DeviceOrientation beta  (deg)
let rawGamma = 0;   // last raw DeviceOrientation gamma (deg)
let sensorsActive = false;
let calibBusy = false;

// ═══════════════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════════════
const physCanvas  = document.getElementById('physicsCanvas');
const ctx         = physCanvas.getContext('2d');
const world       = document.getElementById('world');
const arrowRawCtx   = document.getElementById('arrowRaw').getContext('2d');
const arrowCalCtx   = document.getElementById('arrowCal').getContext('2d');
const arrowGammaCtx = document.getElementById('arrowGamma').getContext('2d');

// ═══════════════════════════════════════════════════════
//  CALIBRATION – persistence
// ═══════════════════════════════════════════════════════
function loadCalibration() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return { ...DEFAULT_CAL };
    const p = JSON.parse(raw);
    return { xSign: p.xSign ?? 1, ySign: p.ySign ?? 1, swapXY: !!p.swapXY };
  } catch { return { ...DEFAULT_CAL }; }
}

function saveCalibration() {
  localStorage.setItem(LS_KEY, JSON.stringify(CAL));
  renderCalibText();
}

function resetCalibration() {
  CAL = { ...DEFAULT_CAL };
  saveCalibration();
}

function renderCalibText() {
  const parts = [];
  if (CAL.swapXY)   parts.push('swapXY');
  if (CAL.xSign < 0) parts.push('x−');
  if (CAL.ySign < 0) parts.push('y−');
  document.getElementById('calibText').textContent =
    parts.length ? `Calibrazione: ${parts.join(', ')}` : 'Calibrazione: neutra';
}

// ── Apply calibration to raw beta/gamma ─────────────
// Convention used by applyCalibration:
//   x starts as beta/90, y starts as gamma/90.
//   swapXY exchanges them → x = gamma/90, y = beta/90.
//   Then xSign / ySign flip axes independently.
function applyCalibration(beta, gamma) {
  let x = beta  / 90;
  let y = gamma / 90;
  if (CAL.swapXY) [x, y] = [y, x];
  x *= CAL.xSign;
  y *= CAL.ySign;
  return { x, y };
}

// ═══════════════════════════════════════════════════════
//  CALIBRATION WIZARD
// ═══════════════════════════════════════════════════════
const CALIB_DURATION = 2400; // ms per step
const CALIB_TICK     = 80;   // ms sampling interval

function startCalibration() {
  if (!sensorsActive) {
    flashWizard('<span class="wiz-warn">⚠ Attiva prima i sensori!</span>', 1800);
    return;
  }
  if (calibBusy) return;

  calibBusy = true;
  setBtnState(true);

  // ── Step 1: tilt RIGHT ───────────────────────────
  runStep({
    icon: '➡️',
    msg:  'Inclina il telefono a <strong>DESTRA</strong><br>e tieni fermo',
    onDone(s1) {
      const b1 = mean(s1, 'beta');
      const g1 = mean(s1, 'gamma');

      // W3C standard: gamma is left/right, beta is fwd/back.
      // Tilting RIGHT → gamma increases on most devices.
      // We detect which raw axis is dominant and map it to gVec.x.
      //
      // In applyCalibration:
      //   swapXY=false → x = beta,  y = gamma
      //   swapXY=true  → x = gamma, y = beta
      //
      // So if gamma is dominant for right-tilt we need swapXY=true.
      if (Math.abs(g1) >= Math.abs(b1)) {
        CAL.swapXY = true;           // gamma → x axis
        CAL.xSign  = g1 >= 0 ? 1 : -1;
      } else {
        CAL.swapXY = false;          // beta → x axis (unusual device)
        CAL.xSign  = b1 >= 0 ? 1 : -1;
      }

      // ── Step 2: tilt DOWN ──────────────────────
      runStep({
        icon: '⬇️',
        msg:  'Inclina verso il <strong>BASSO</strong><br>(fondo del telefono in avanti)',
        onDone(s2) {
          const b2 = mean(s2, 'beta');
          const g2 = mean(s2, 'gamma');

          // "Tilt down" (bottom of phone moves away from user) → beta increases.
          // After swap:
          //   swapXY=true  → y = beta * ySign → use b2 sign
          //   swapXY=false → y = gamma * ySign (gamma barely moves when tilting down)
          //                  fall back to whichever axis is dominant
          if (CAL.swapXY) {
            CAL.ySign = b2 >= 0 ? 1 : -1;
          } else {
            const dominant = Math.abs(b2) > Math.abs(g2) ? b2 : g2;
            CAL.ySign = dominant >= 0 ? 1 : -1;
          }

          saveCalibration();
          calibBusy = false;
          setBtnState(false);
          flashWizard('<span class="wiz-done">✓ Calibrazione completata!</span>', 2000);
        }
      });
    }
  });
}

/**
 * Run a single calibration step.
 * @param {object} opts  { icon, msg, onDone(samples[]) }
 */
function runStep({ icon, msg, onDone }) {
  const samples = [];
  let elapsed   = 0;

  const wiz = document.getElementById('calibWizard');
  wiz.style.display = 'block';
  wiz.innerHTML = `
    <div class="wiz-icon">${icon}</div>
    <div>${msg}</div>
    <div class="wiz-bar"><div class="wiz-bar-fill" id="wFill"></div></div>
  `;

  const timer = setInterval(() => {
    samples.push({ beta: rawBeta, gamma: rawGamma });
    elapsed += CALIB_TICK;
    const fill = document.getElementById('wFill');
    if (fill) fill.style.width = Math.min(100, elapsed / CALIB_DURATION * 100) + '%';
    if (elapsed >= CALIB_DURATION) {
      clearInterval(timer);
      onDone(samples);
    }
  }, CALIB_TICK);
}

function flashWizard(html, duration = 1600) {
  const wiz = document.getElementById('calibWizard');
  wiz.style.display = 'block';
  wiz.innerHTML = html;
  setTimeout(() => { wiz.style.display = 'none'; }, duration);
}

function setBtnState(busy) {
  document.getElementById('calibStart').disabled = busy;
  document.getElementById('calibReset').disabled = busy;
}

function mean(arr, key) {
  return arr.reduce((s, v) => s + v[key], 0) / arr.length;
}

// ═══════════════════════════════════════════════════════
//  DEBUG DISPLAY
// ═══════════════════════════════════════════════════════
const ORIENT_NAMES = {
  0:   'Verticale ↑',
  90:  'Orizzontale →',
  180: 'Capovolto ↓',
  270: 'Orizzontale ←',
};

function updateDebug() {
  const angle = getOrientAngle();
  document.getElementById('calibOrient').textContent =
    ORIENT_NAMES[angle] ?? `${angle}°`;

  document.getElementById('calibSensorVals').textContent =
    `β ${rawBeta.toFixed(1)}°  γ ${rawGamma.toFixed(1)}°`;

  // "Grezzo": natural W3C mapping, no calibration — gamma→x, beta→y
  drawArrow(arrowRawCtx, 58, rawGamma / 90, rawBeta / 90, '#4a9eff');

  // "Calibrato": actual gVec driving the physics
  drawArrow(arrowCalCtx, 58, gVec.x, gVec.y, '#e03030');

  // "Solo γ": gamma maps ONLY to the horizontal axis, y fixed to 0.
  // According to W3C, gamma is always the physical left/right tilt of the
  // device regardless of screen orientation.  This arrow should consistently
  // point left/right when you tilt the phone sideways, even if the screen
  // has rotated to landscape.  Compare it with the others to verify.
  drawArrow(arrowGammaCtx, 58, rawGamma / 90, 0, '#a0e040');
}

/**
 * Draw a direction arrow inside a circular canvas.
 * @param {CanvasRenderingContext2D} actx
 * @param {number} size  canvas width/height (square)
 * @param {number} x     direction x, range [-1, 1]
 * @param {number} y     direction y, range [-1, 1]
 * @param {string} color CSS color
 */
function drawArrow(actx, size, x, y, color) {
  const cx = size / 2, cy = size / 2, r = size / 2 - 1;

  actx.clearRect(0, 0, size, size);

  // Background circle
  actx.fillStyle = 'rgba(18,18,18,0.88)';
  actx.beginPath();
  actx.arc(cx, cy, r, 0, Math.PI * 2);
  actx.fill();

  // Crosshairs
  actx.strokeStyle = 'rgba(255,255,255,0.1)';
  actx.lineWidth = 1;
  actx.beginPath();
  actx.moveTo(cx - r + 4, cy); actx.lineTo(cx + r - 4, cy);
  actx.moveTo(cx, cy - r + 4); actx.lineTo(cx, cy + r - 4);
  actx.stroke();

  const mag = Math.hypot(x, y);
  if (mag < 0.04) {
    // Stationary dot
    actx.fillStyle = 'rgba(255,255,255,0.25)';
    actx.beginPath();
    actx.arc(cx, cy, 3, 0, Math.PI * 2);
    actx.fill();
    return;
  }

  const nx  = x / mag;
  const ny  = y / mag;
  const len = Math.min(mag, 1) * (r - 8);
  const ex  = cx + nx * len;
  const ey  = cy + ny * len;
  const ang = Math.atan2(ny, nx);

  // Shaft
  actx.strokeStyle = color;
  actx.lineWidth = 2.2;
  actx.lineCap = 'round';
  actx.beginPath();
  actx.moveTo(cx, cy);
  actx.lineTo(ex, ey);
  actx.stroke();

  // Arrowhead
  const hw = 0.38; // half-angle of head (radians)
  const hl = 9;    // head length (px)
  actx.fillStyle = color;
  actx.beginPath();
  actx.moveTo(ex, ey);
  actx.lineTo(ex - hl * Math.cos(ang - hw), ey - hl * Math.sin(ang - hw));
  actx.lineTo(ex - hl * Math.cos(ang + hw), ey - hl * Math.sin(ang + hw));
  actx.closePath();
  actx.fill();
}

// ═══════════════════════════════════════════════════════
//  SCREEN ORIENTATION HELPERS
// ═══════════════════════════════════════════════════════
function getOrientAngle() {
  if (screen.orientation && screen.orientation.angle !== undefined)
    return screen.orientation.angle;
  return typeof window.orientation === 'number' ? Math.abs(window.orientation) : 0;
}

// ═══════════════════════════════════════════════════════
//  RESIZE / ORIENTATION CHANGE
// ═══════════════════════════════════════════════════════
function onResize() {
  const newAngle = getOrientAngle();
  const rotated  = newAngle !== lastOrientAngle;
  const wr = world.getBoundingClientRect();
  const newW = wr.width, newH = wr.height;

  if (rotated) {
    const delta = ((newAngle - lastOrientAngle) + 360) % 360;

    let nx, ny, nvx, nvy;
    if (delta === 90) {
      nx = 1 - ball.ny; ny = ball.nx;
      nvx = ball.nvy;   nvy = -ball.nvx;
    } else if (delta === 270) {
      nx = ball.ny;     ny = 1 - ball.nx;
      nvx = -ball.nvy;  nvy = ball.nvx;
    } else if (delta === 180) {
      nx = 1 - ball.nx; ny = 1 - ball.ny;
      nvx = -ball.nvx;  nvy = -ball.nvy;
    } else {
      nx = ball.nx; ny = ball.ny; nvx = ball.nvx; nvy = ball.nvy;
    }

    ball.nx  = Math.min(Math.max(nx,  0), 1);
    ball.ny  = Math.min(Math.max(ny,  0), 1);
    ball.nvx = nvx; ball.nvy = nvy;
    lastOrientAngle = newAngle;
  }

  W = physCanvas.width  = newW;
  H = physCanvas.height = newH;
  refreshObstacles();
}

// ═══════════════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════════════
function registerObstacles(selectors = ['.obstacle']) {
  obstacles = [];
  const wr = world.getBoundingClientRect();
  selectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      if (el.id === 'permBtn' && el.dataset.disabled === '1') return;
      const rect = el.getBoundingClientRect();
      obstacles.push({
        nx: (rect.left - wr.left) / wr.width,
        ny: (rect.top  - wr.top)  / wr.height,
        nw: rect.width  / wr.width,
        nh: rect.height / wr.height,
      });
    });
  });
}

function refreshObstacles() { registerObstacles(); }

// ═══════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════
const FIXED_DT   = 1 / 120;
const MAX_ACCUM  = FIXED_DT * 8;
let accumulator  = 0;
let lastTime     = null;

function normRadius() { return H > 0 ? CFG.radius / H : 0; }

function physicsStep(dt) {
  const nr = normRadius();
  const gn = CFG.gravity / H;

  ball.nvx += gVec.x * gn * dt;
  ball.nvy += gVec.y * gn * dt;
  ball.nvx *= CFG.friction;
  ball.nvy *= CFG.friction;
  ball.nx  += ball.nvx * dt;
  ball.ny  += ball.nvy * dt;

  const nrX = nr * (H / W);

  if (ball.nx - nrX < 0) {
    ball.nx  = nrX;
    ball.nvx = Math.abs(ball.nvx) * CFG.restitution;
  } else if (ball.nx + nrX > 1) {
    ball.nx  = 1 - nrX;
    ball.nvx = -Math.abs(ball.nvx) * CFG.restitution;
  }

  if (ball.ny - nr < 0) {
    ball.ny  = nr;
    ball.nvy = Math.abs(ball.nvy) * CFG.restitution;
  } else if (ball.ny + nr > 1) {
    ball.ny  = 1 - nr;
    ball.nvy = -Math.abs(ball.nvy) * CFG.restitution;
  }

  for (const ob of obstacles) resolveAABB(ob);
}

function resolveAABB(ob) {
  const bx = ball.nx * W, by = ball.ny * H;
  const r  = CFG.radius;
  const ox = ob.nx * W,   oy = ob.ny * H;
  const ow = ob.nw * W,   oh = ob.nh * H;

  const cx   = Math.max(ox, Math.min(bx, ox + ow));
  const cy_  = Math.max(oy, Math.min(by, oy + oh));
  const dx   = bx - cx, dy = by - cy_;
  const dist2 = dx * dx + dy * dy;
  if (dist2 >= r * r) return;

  const dist = Math.sqrt(dist2) || 0.001;
  const nx_  = dx / dist, ny_ = dy / dist;
  const pen  = r - dist;

  ball.nx += (nx_ * pen) / W;
  ball.ny += (ny_ * pen) / H;

  const pvx = ball.nvx * W, pvy = ball.nvy * H;
  const dot = pvx * nx_ + pvy * ny_;
  if (dot < 0) {
    ball.nvx = (pvx - (1 + CFG.restitution) * dot * nx_) / W;
    ball.nvy = (pvy - (1 + CFG.restitution) * dot * ny_) / H;
  }
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);
  const px = ball.nx * W, py = ball.ny * H, r = CFG.radius;

  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = '#e03030';
  ctx.fill();

  const grad = ctx.createRadialGradient(
    px - r * 0.3, py - r * 0.35, r * 0.05,
    px, py, r
  );
  grad.addColorStop(0, 'rgba(255,255,255,0.45)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Update debug panel every frame (cheap)
  updateDebug();
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) lastTime = ts;
  const raw = Math.min((ts - lastTime) / 1000, MAX_ACCUM);
  lastTime = ts;
  accumulator += raw;
  while (accumulator >= FIXED_DT) {
    physicsStep(FIXED_DT);
    accumulator -= FIXED_DT;
  }
  render();
}

// ═══════════════════════════════════════════════════════
//  DEVICE ORIENTATION
// ═══════════════════════════════════════════════════════
function onOrientation(e) {
  rawBeta  = e.beta  ?? 0;
  rawGamma = e.gamma ?? 0;

  const angle = getOrientAngle();
  const cal   = applyCalibration(rawBeta, rawGamma);

  // Rotate the calibrated vector according to screen orientation.
  // (When screen rotates 90° CW, the physical axes swap relative to the display.)
  switch (angle) {
    case 0:
      gVec.x =  cal.x; gVec.y =  cal.y; break;
    case 90:
      gVec.x =  cal.y; gVec.y =  cal.x; break;
    case 270:
      gVec.x = -cal.y; gVec.y = -cal.x; break;
    case 180:
      gVec.x = -cal.x; gVec.y = -cal.y; break;
    default:
      gVec.x =  cal.x; gVec.y =  cal.y;
  }

  gVec.x = Math.max(-1, Math.min(1, gVec.x));
  gVec.y = Math.max(-1, Math.min(1, gVec.y));
}

function startOrientation() {
  sensorsActive = true;
  window.addEventListener('deviceorientation', onOrientation);
}

// ═══════════════════════════════════════════════════════
//  SENSOR PERMISSION
// ═══════════════════════════════════════════════════════
function setupOrientation() {
  const btn = document.getElementById('permBtn');

  const markEnabled = () => {
    btn.dataset.disabled = '1';
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.4';
    btn.textContent = '✔ Sensori abilitati';
    startOrientation();
    refreshObstacles();
  };

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+: requires explicit user gesture
    btn.style.display = 'inline-block';
    btn.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission()
        .then(state => { if (state === 'granted') markEnabled(); })
        .catch(() => {});
    });
  } else if (window.DeviceOrientationEvent) {
    // Android / desktop: auto-enable
    markEnabled();
  }
}

// ═══════════════════════════════════════════════════════
//  SLIDER BINDINGS
// ═══════════════════════════════════════════════════════
function bindSlider(id, valId, key) {
  const sl  = document.getElementById(id);
  const lbl = document.getElementById(valId);
  sl.addEventListener('input', () => { CFG[key] = +sl.value; lbl.textContent = sl.value; });
}

bindSlider('slGravity',     'valGravity',     'gravity');
bindSlider('slRestitution', 'valRestitution', 'restitution');
bindSlider('slFriction',    'valFriction',    'friction');
bindSlider('slRadius',      'valRadius',      'radius');

document.getElementById('resetBtn').addEventListener('click', () => {
  ball.nx = 0.5; ball.ny = 0.25; ball.nvx = 0; ball.nvy = 0;
});

document.getElementById('calibReset').addEventListener('click', resetCalibration);
document.getElementById('calibStart').addEventListener('click', startCalibration);

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
if (screen.orientation) screen.orientation.addEventListener('change', onResize);
window.addEventListener('orientationchange', onResize);
new ResizeObserver(onResize).observe(world);

onResize();
renderCalibText();
setupOrientation();
refreshObstacles();
requestAnimationFrame(loop);
</script>
</body>
</html>
