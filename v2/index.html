<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bouncing Ball</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      background: #0d0d0d;
      font-family: system-ui, sans-serif;
    }

    #world {
      position: relative;
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
    }

    canvas#physicsCanvas {
      position: absolute;
      inset: 0;
      display: block;
      z-index: 1;
    }

    .obstacle {
      position: absolute;
      background: #3a6ea5;
      border-radius: 6px;
      z-index: 2;
      pointer-events: auto;
    }

    #permBtn {
      position: absolute;
      left: 50%;
      bottom: 20%;
      transform: translateX(-50%);
      background: #e03030;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(224,48,48,0.35);
      z-index: 3;
    }
    #permBtn:hover  { background: #c02020; }
    #permBtn:active { transform: translateX(-50%) translateY(1px); }

    /* ── Physics controls ───────────────────────── */
    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      font-size: .78rem;
      min-width: 200px;
      user-select: none;
    }
    #controls summary {
      cursor: pointer;
      font-weight: 700;
      font-size: .85rem;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controls summary::before { content: '⚙️'; }
    #controls .ctrl-body { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .ctrl-row { display: flex; flex-direction: column; gap: 2px; }
    .ctrl-row label { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .ctrl-row label span   { opacity: .75; }
    .ctrl-row label strong { font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }
    .ctrl-row input[type=range] { width: 100%; accent-color: #e03030; cursor: pointer; }
    #resetBtn {
      margin-top: 4px; width: 100%; padding: 6px;
      border: 1px solid rgba(255,255,255,.2); border-radius: 6px;
      background: transparent; color: #fff; cursor: pointer; font-size: .78rem;
    }
    #resetBtn:hover { background: rgba(255,255,255,.1); }

    /* ── Debug panel ────────────────────────────── */
    #calib {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 50;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 10px 12px;
      color: #fff;
      font-size: .76rem;
      width: 248px;
      user-select: none;
    }
    #calibOrient { font-weight: 700; font-size: .8rem; margin-bottom: 1px; }
    #calibSensorVals {
      font-size: .68rem; opacity: .55;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px; letter-spacing: .02em;
    }
    .arrows-row {
      display: flex; gap: 6px;
      justify-content: space-around;
      margin-bottom: 8px;
    }
    .arrow-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .arrow-label { font-size: .63rem; opacity: .65; text-align: center; line-height: 1.2; }
    .arrow-canvas { border-radius: 50%; display: block; }
    #calibText { font-size: .7rem; opacity: .75; text-align: center; margin-bottom: 8px; }
    #signBtns { display: flex; gap: 6px; }
    #calib button {
      flex: 1; padding: 6px 4px;
      border: 1px solid rgba(255,255,255,.2); border-radius: 6px;
      background: transparent; color: #fff; cursor: pointer;
      font-size: .72rem; transition: background .15s;
    }
    #calib button:hover { background: rgba(255,255,255,.1); }
    .btn-active {
      border-color: rgba(224,48,48,.6) !important;
      background: rgba(224,48,48,.18) !important;
    }
  </style>
</head>
<body>

<div id="world">
  <canvas id="physicsCanvas"></canvas>
  <button id="permBtn" class="obstacle">🔄 Abilita sensori</button>
</div>

<!-- ── Debug panel ───────────────────────────── -->
<div id="calib">
  <div id="calibOrient">Orientamento: —</div>
  <div id="calibSensorVals">β —°  γ —°</div>

  <div class="arrows-row">
    <div class="arrow-cell">
      <div class="arrow-label">📡 Grezzo<br>(W3C)</div>
      <canvas class="arrow-canvas" id="arrowRaw"   width="58" height="58"></canvas>
    </div>
    <div class="arrow-cell">
      <div class="arrow-label">⚽ Calibrato<br>(gVec)</div>
      <canvas class="arrow-canvas" id="arrowCal"   width="58" height="58"></canvas>
    </div>
    <div class="arrow-cell">
      <div class="arrow-label">🧭 Solo γ<br>(fisico L/R)</div>
      <canvas class="arrow-canvas" id="arrowGamma" width="58" height="58"></canvas>
    </div>
  </div>

  <div id="calibText">Correzioni: nessuna</div>

  <div id="signBtns">
    <button id="btnFlipX">↔ Inverti X</button>
    <button id="btnFlipY">↕ Inverti Y</button>
    <button id="btnReset">↺ Reset</button>
  </div>
  <div id="version">v2</div>
</div>

<!-- ── Physics controls ───────────────────── -->
<details id="controls" open>
  <summary>Fisica</summary>
  <div class="ctrl-body">
    <div class="ctrl-row">
      <label><span>Gravità</span><strong id="valGravity">980</strong></label>
      <input type="range" id="slGravity" min="100" max="3000" step="10" value="980" />
    </div>
    <div class="ctrl-row">
      <label><span>Rimbalzo</span><strong id="valRestitution">0.72</strong></label>
      <input type="range" id="slRestitution" min="0" max="1" step="0.01" value="0.72" />
    </div>
    <div class="ctrl-row">
      <label><span>Attrito</span><strong id="valFriction">0.985</strong></label>
      <input type="range" id="slFriction" min="0.8" max="1" step="0.001" value="0.985" />
    </div>
    <div class="ctrl-row">
      <label><span>Raggio pallina</span><strong id="valRadius">22</strong></label>
      <input type="range" id="slRadius" min="8" max="80" step="1" value="22" />
    </div>
    <button id="resetBtn">↺ Reimposta pallina</button>
  </div>
</details>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const CFG = { gravity: 980, restitution: 0.72, friction: 0.985, radius: 22 };
const LS_KEY = 'ball-sign-calibration-v2';

// ═══════════════════════════════════════════════════════
//  DEVICE NATURAL ORIENTATION — detected lazily
//
//  We cannot rely on screen.width/height (hardware constants
//  that ignore rotation) nor on the container at page-load
//  (layout may not have settled yet, and sensors aren't active).
//
//  On the FIRST deviceorientation event we read:
//    • the container's actual rendered dimensions → portrait or landscape NOW?
//    • the raw screen.orientation.angle           → what does the OS call this?
//
//  From those two facts we derive whether the device's natural
//  orientation is landscape (iPad) or portrait (iPhone/iPod):
//
//    naturalIsLandscape = (containerIsLandscape) === (rawAngle is 0° or 180°)
//
//  Proof by cases:
//    iPad  landscape (normal):   w>h ✓, angle=0  ✓  →  true  ✓
//    iPad  portrait  (rotated):  w>h ✗, angle=90 ✗  →  true  ✓
//    iPhone portrait (normal):   w>h ✗, angle=0  ✓  →  false ✓
//    iPhone landscape (rotated): w>h ✓, angle=90 ✗  →  false ✓
// ═══════════════════════════════════════════════════════
let naturalIsLandscape = false; // refined on first sensor event, see detectNaturalOrientation()

function detectNaturalOrientation() {
  const wr  = world.getBoundingClientRect();
  const raw = screen.orientation?.angle ?? Math.abs(window.orientation ?? 0);
  naturalIsLandscape = (wr.width > wr.height) === (raw === 0 || raw === 180);
}

function getOrientAngle() {
  let a = 0;
  if (screen.orientation?.angle !== undefined) a = screen.orientation.angle;
  else if (typeof window.orientation === 'number') a = Math.abs(window.orientation);
  if (naturalIsLandscape) {
    // iPad natural = landscape. screen.orientation.angle misura la rotazione CW
    // dal landscape naturale. Per normalizzare a un sistema portrait-centrico
    // dobbiamo INVERTIRE la direzione della rotazione, non aggiungerle 90°.
    //   raw=0°  (landscape)  → 90°   ✓
    //   raw=90° (portrait)   → 0°    ✓  (era 180° con +90°, causava inversione X/Y)
    //   raw=180° (land. flip)→ 270°
    //   raw=270° (port. flip)→ 180°
    return (90 - a + 360) % 360;
  }
  return a;
}

// ═══════════════════════════════════════════════════════
//  MANUAL SIGN CORRECTIONS  (fallback only)
//  xSign / ySign are always in screen-axis space.
// ═══════════════════════════════════════════════════════
function loadSigns() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_KEY) ?? 'null');
    return { xSign: raw?.xSign === -1 ? -1 : 1, ySign: raw?.ySign === -1 ? -1 : 1 };
  } catch { return { xSign: 1, ySign: 1 }; }
}

function saveSigns() {
  localStorage.setItem(LS_KEY, JSON.stringify(SIGNS));
  renderSignText();
  updateSignButtons();
}

function renderSignText() {
  const parts = [];
  if (SIGNS.xSign < 0) parts.push('X invertito');
  if (SIGNS.ySign < 0) parts.push('Y invertito');
  document.getElementById('calibText').textContent =
    parts.length ? `Correzioni: ${parts.join(', ')}` : 'Correzioni: nessuna';
}

function updateSignButtons() {
  document.getElementById('btnFlipX').classList.toggle('btn-active', SIGNS.xSign < 0);
  document.getElementById('btnFlipY').classList.toggle('btn-active', SIGNS.ySign < 0);
}

let SIGNS = loadSigns();

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const gVec = { x: 0, y: 1 };
const ball  = { nx: 0.5, ny: 0.25, nvx: 0, nvy: 0 };
let obstacles = [];
let W = 0, H = 0;
let lastOrientAngle = getOrientAngle();
let rawBeta = 0, rawGamma = 0;

// ═══════════════════════════════════════════════════════
//  DOM
// ═══════════════════════════════════════════════════════
const physCanvas    = document.getElementById('physicsCanvas');
const ctx           = physCanvas.getContext('2d');
const world         = document.getElementById('world');
const arrowRawCtx   = document.getElementById('arrowRaw').getContext('2d');
const arrowCalCtx   = document.getElementById('arrowCal').getContext('2d');
const arrowGammaCtx = document.getElementById('arrowGamma').getContext('2d');

// ═══════════════════════════════════════════════════════
//  DEVICE ORIENTATION
//
//  W3C axes are fixed to the device body (not the screen):
//    gamma → physical left/right tilt  (device Y axis)
//    beta  → physical fwd/back tilt    (device X axis)
//
//  Mapping to screen axes for each normalised screen angle:
//    0°  portrait           → screenX =  gamma,  screenY =  beta
//    90° landscape right    → screenX =  beta,   screenY = -gamma
//   180° portrait flipped   → screenX = -gamma,  screenY = -beta
//   270° landscape left     → screenX = -beta,   screenY =  gamma
// ═══════════════════════════════════════════════════════
let orientationDetected = false;

function onOrientation(e) {
  // Detect natural orientation once, on the first real sensor event,
  // when the container layout is guaranteed to reflect the current rotation.
  if (!orientationDetected) {
    detectNaturalOrientation();
    orientationDetected = true;
    // Re-sync lastOrientAngle now that naturalIsLandscape is correct
    lastOrientAngle = getOrientAngle();
  }

  rawBeta  = e.beta  ?? 0;
  rawGamma = e.gamma ?? 0;

  const g = rawGamma / 90;
  const b = rawBeta  / 90;

  let sx, sy;
  switch (getOrientAngle()) {
    case 90:  sx =  b; sy = -g; break;
    case 180: sx = -g; sy = -b; break;
    case 270: sx = -b; sy =  g; break;
    default:  sx =  g; sy =  b;   // 0° — portrait
  }

  gVec.x = Math.max(-1, Math.min(1, sx * SIGNS.xSign));
  gVec.y = Math.max(-1, Math.min(1, sy * SIGNS.ySign));
}

function startOrientation() {
  window.addEventListener('deviceorientation', onOrientation);
}

// ═══════════════════════════════════════════════════════
//  RESIZE / ROTATION
// ═══════════════════════════════════════════════════════
function onResize() {
  const newAngle = getOrientAngle();
  const rotated  = newAngle !== lastOrientAngle;
  const wr = world.getBoundingClientRect();

  if (rotated) {
    const delta = ((newAngle - lastOrientAngle) + 360) % 360;
    let nx, ny, nvx, nvy;
    if (delta === 90) {
      nx = ball.ny;     ny = 1 - ball.nx; nvx =  ball.nvy; nvy = -ball.nvx;
    } else if (delta === 270) {
      nx = 1 - ball.ny; ny = ball.nx;     nvx = -ball.nvy; nvy =  ball.nvx;
    } else {
      nx = 1 - ball.nx; ny = 1 - ball.ny; nvx = -ball.nvx; nvy = -ball.nvy;
    }
    ball.nx  = Math.min(Math.max(nx,  0), 1);
    ball.ny  = Math.min(Math.max(ny,  0), 1);
    ball.nvx = nvx; ball.nvy = nvy;
    lastOrientAngle = newAngle;
  }

  W = physCanvas.width  = wr.width;
  H = physCanvas.height = wr.height;
  refreshObstacles();
}

// ═══════════════════════════════════════════════════════
//  OBSTACLES
// ═══════════════════════════════════════════════════════
function refreshObstacles() {
  obstacles = [];
  const wr = world.getBoundingClientRect();
  document.querySelectorAll('.obstacle').forEach(el => {
    if (el.id === 'permBtn' && el.dataset.disabled === '1') return;
    const r = el.getBoundingClientRect();
    obstacles.push({
      nx: (r.left - wr.left) / wr.width,
      ny: (r.top  - wr.top)  / wr.height,
      nw: r.width  / wr.width,
      nh: r.height / wr.height,
    });
  });
}

// ═══════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════
const FIXED_DT  = 1 / 120;
const MAX_ACCUM = FIXED_DT * 8;
let accumulator = 0, lastTime = null;

function physicsStep(dt) {
  const nr = H > 0 ? CFG.radius / H : 0;
  const gnX = W > 0 ? CFG.gravity / W : 0;
  const gnY = H > 0 ? CFG.gravity / H : 0;

  ball.nvx += gVec.x * gnX * dt;
  ball.nvy += gVec.y * gnY * dt;
  ball.nvx *= CFG.friction;
  ball.nvy *= CFG.friction;
  ball.nx  += ball.nvx * dt;
  ball.ny  += ball.nvy * dt;

  const nrX = nr * (H / W);
  if (ball.nx - nrX < 0) { ball.nx =      nrX; ball.nvx =  Math.abs(ball.nvx) * CFG.restitution; }
  if (ball.nx + nrX > 1) { ball.nx = 1  - nrX; ball.nvx = -Math.abs(ball.nvx) * CFG.restitution; }
  if (ball.ny - nr  < 0) { ball.ny =       nr;  ball.nvy =  Math.abs(ball.nvy) * CFG.restitution; }
  if (ball.ny + nr  > 1) { ball.ny = 1  -  nr;  ball.nvy = -Math.abs(ball.nvy) * CFG.restitution; }

  for (const ob of obstacles) resolveAABB(ob);
}

function resolveAABB(ob) {
  const bx = ball.nx * W, by = ball.ny * H, r = CFG.radius;
  const ox = ob.nx * W,   oy = ob.ny * H;
  const ow = ob.nw * W,   oh = ob.nh * H;

  const cx = Math.max(ox, Math.min(bx, ox + ow));
  const cy = Math.max(oy, Math.min(by, oy + oh));
  const dx = bx - cx, dy = by - cy;
  const d2 = dx * dx + dy * dy;
  if (d2 >= r * r) return;

  const dist = Math.sqrt(d2) || 0.001;
  const nx = dx / dist, ny = dy / dist;
  ball.nx += nx * (r - dist) / W;
  ball.ny += ny * (r - dist) / H;

  const pvx = ball.nvx * W, pvy = ball.nvy * H;
  const dot = pvx * nx + pvy * ny;
  if (dot < 0) {
    ball.nvx = (pvx - (1 + CFG.restitution) * dot * nx) / W;
    ball.nvy = (pvy - (1 + CFG.restitution) * dot * ny) / H;
  }
}

// ═══════════════════════════════════════════════════════
//  DEBUG
// ═══════════════════════════════════════════════════════
const ORIENT_NAMES = {
  0: 'Portrait ↑', 90: 'Landscape →', 180: 'Portrait ↓', 270: 'Landscape ←',
};

function updateDebug() {
  const angle = getOrientAngle();
  const tag   = orientationDetected
    ? (naturalIsLandscape ? ' (iPad/landscape)' : ' (iPhone/portrait)')
    : ' (in attesa…)';
  document.getElementById('calibOrient').textContent =
    (ORIENT_NAMES[angle] ?? angle + '°') + tag;
  document.getElementById('calibSensorVals').textContent =
    `β ${rawBeta.toFixed(1)}°  γ ${rawGamma.toFixed(1)}°`;

  drawArrow(arrowRawCtx,   58, rawGamma / 90, rawBeta / 90, '#4a9eff');
  drawArrow(arrowCalCtx,   58, gVec.x,        gVec.y,       '#e03030');
  drawArrow(arrowGammaCtx, 58, rawGamma / 90, 0,            '#a0e040');
}

function drawArrow(actx, size, x, y, color) {
  const cx = size / 2, cy = size / 2, r = size / 2 - 1;
  actx.clearRect(0, 0, size, size);

  actx.fillStyle = 'rgba(18,18,18,0.88)';
  actx.beginPath(); actx.arc(cx, cy, r, 0, Math.PI * 2); actx.fill();

  actx.strokeStyle = 'rgba(255,255,255,0.1)'; actx.lineWidth = 1;
  actx.beginPath();
  actx.moveTo(cx - r + 4, cy); actx.lineTo(cx + r - 4, cy);
  actx.moveTo(cx, cy - r + 4); actx.lineTo(cx, cy + r - 4);
  actx.stroke();

  const mag = Math.hypot(x, y);
  if (mag < 0.04) {
    actx.fillStyle = 'rgba(255,255,255,0.25)';
    actx.beginPath(); actx.arc(cx, cy, 3, 0, Math.PI * 2); actx.fill();
    return;
  }

  const nx  = x / mag, ny = y / mag;
  const len = Math.min(mag, 1) * (r - 8);
  const ex  = cx + nx * len, ey = cy + ny * len;
  const ang = Math.atan2(ny, nx);

  actx.strokeStyle = color; actx.lineWidth = 2.2; actx.lineCap = 'round';
  actx.beginPath(); actx.moveTo(cx, cy); actx.lineTo(ex, ey); actx.stroke();

  actx.fillStyle = color;
  actx.beginPath();
  actx.moveTo(ex, ey);
  actx.lineTo(ex - 9 * Math.cos(ang - 0.38), ey - 9 * Math.sin(ang - 0.38));
  actx.lineTo(ex - 9 * Math.cos(ang + 0.38), ey - 9 * Math.sin(ang + 0.38));
  actx.closePath(); actx.fill();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);
  const px = ball.nx * W, py = ball.ny * H, r = CFG.radius;

  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = '#e03030'; ctx.fill();

  const grad = ctx.createRadialGradient(px - r * .3, py - r * .35, r * .05, px, py, r);
  grad.addColorStop(0, 'rgba(255,255,255,0.45)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();

  updateDebug();
}

// ═══════════════════════════════════════════════════════
//  LOOP
// ═══════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) lastTime = ts;
  const raw = Math.min((ts - lastTime) / 1000, MAX_ACCUM);
  lastTime = ts;
  accumulator += raw;
  while (accumulator >= FIXED_DT) { physicsStep(FIXED_DT); accumulator -= FIXED_DT; }
  render();
}

// ═══════════════════════════════════════════════════════
//  SENSOR PERMISSION
// ═══════════════════════════════════════════════════════
function setupOrientation() {
  const btn = document.getElementById('permBtn');
  const markEnabled = () => {
    btn.dataset.disabled = '1';
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.4';
    btn.textContent = '✔ Sensori abilitati';
    startOrientation();
    refreshObstacles();
  };
  if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
    btn.style.display = 'inline-block';
    btn.addEventListener('click', () => {
      DeviceOrientationEvent.requestPermission()
        .then(s => { if (s === 'granted') markEnabled(); })
        .catch(() => {});
    });
  } else if (window.DeviceOrientationEvent) {
    markEnabled();
  }
}

// ═══════════════════════════════════════════════════════
//  BINDINGS
// ═══════════════════════════════════════════════════════
function bindSlider(id, valId, key) {
  const sl = document.getElementById(id), lbl = document.getElementById(valId);
  sl.addEventListener('input', () => { CFG[key] = +sl.value; lbl.textContent = sl.value; });
}
bindSlider('slGravity',     'valGravity',     'gravity');
bindSlider('slRestitution', 'valRestitution', 'restitution');
bindSlider('slFriction',    'valFriction',    'friction');
bindSlider('slRadius',      'valRadius',      'radius');

document.getElementById('resetBtn').addEventListener('click',  () => {
  ball.nx = 0.5; ball.ny = 0.25; ball.nvx = 0; ball.nvy = 0;
});
document.getElementById('btnFlipX').addEventListener('click', () => { SIGNS.xSign *= -1; saveSigns(); });
document.getElementById('btnFlipY').addEventListener('click', () => { SIGNS.ySign *= -1; saveSigns(); });
document.getElementById('btnReset').addEventListener('click',  () => { SIGNS = { xSign: 1, ySign: 1 }; saveSigns(); });

if (screen.orientation) screen.orientation.addEventListener('change', onResize);
window.addEventListener('orientationchange', onResize);
new ResizeObserver(onResize).observe(world);

onResize();
renderSignText();
updateSignButtons();
setupOrientation();
refreshObstacles();
requestAnimationFrame(loop);
</script>
</body>
</html>
