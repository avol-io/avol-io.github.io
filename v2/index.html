<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<title>Physics Ball</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0f0f0f;
  }

  body {
    font-family: system-ui, sans-serif;
  }

  #div-a {
    position: fixed;
    inset: 0;
    transform-origin: center center;
  }

  #div-b {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    transform-origin: center center;
    pointer-events: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transform: translate(-50%, -50%);
  }

  #ball-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 10;
  }

  #obstacles-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  #gravity-arrow-a {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: white;
    opacity: 0.25;
    user-select: none;
    pointer-events: none;
    z-index: 30;
  }

  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    color: white;
    text-align: center;
    padding: 24px;
  }

  #permission-overlay p {
    font-size: 16px;
    opacity: 0.8;
    max-width: 300px;
  }

  #permission-btn {
    padding: 12px 32px;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
  }

  #permission-overlay.hidden { display: none; }

  #debug-info {
    position: fixed;
    top: 8px;
    left: 8px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    z-index: 200;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 6px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <p>This experience needs access to device orientation sensors.</p>
  <button id="permission-btn" type="button">Enable Motion</button>
</div>

<div id="div-a">
  <div id="div-b">↓</div>
  <canvas id="ball-canvas">Your browser does not support the canvas element.</canvas>
  <div id="obstacles-layer">
    <div class="obstacle" style="
      position:absolute; left:20%; top:40%;
      width:60%; height:12px;
      background: rgba(255,255,255,0.12);
      border-radius:6px;
    "></div>
  </div>
  <div id="gravity-arrow-a">↓</div>
</div>

<div id="debug-info">waiting for sensor…</div>

<script>
(function () {
  'use strict';

  const BALL_RADIUS = 18;
  const RESTITUTION = 0.72;
  const FRICTION = 0.985;
  const DAMPING = 0.999;
  const GRAVITY_STRENGTH = 0.0035;
  const WIN_ACCEL_SCALE = 0.18;
  const WIN_LOWPASS = 0.12;
  const MAX_WIN_DELTA = 40;
  const ABS_EVENT_TIMEOUT_MS = 500;

  const divA = document.getElementById('div-a');
  const divB = document.getElementById('div-b');
  const canvas = document.getElementById('ball-canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('permission-overlay');
  const permBtn = document.getElementById('permission-btn');
  const debugEl = document.getElementById('debug-info');
  const arrowA = document.getElementById('gravity-arrow-a');
  const obstaclesLayer = document.getElementById('obstacles-layer');

  if (!ctx) {
    debugEl.textContent = 'Canvas 2D context unavailable.';
    overlay.classList.add('hidden');
    return;
  }

  let canvasW = 0;
  let canvasH = 0;
  let lastTime = null;
  let rafId = null;
  let initialized = false;
  let destroyed = false;

  const gravity = { x: 0, y: GRAVITY_STRENGTH };
  const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: BALL_RADIUS };

  let rawBeta = 0;
  let rawGamma = 0;
  let deviceAngle = 0;
  let snapAngle = 0;
  let usingGyro = false;
  let orientationIsAbsolute = false;
  let lastAbsoluteEventTs = 0;

  let smoothedBeta = 0;
  let betaFlipArmed = true;
  const BETA_LP = 0.08;
  const BETA_HYST_POS = 20;
  const BETA_HYST_NEG = -20;
  let lastBetaRegion = 'pos';

  let isPortrait = window.innerHeight > window.innerWidth;

  let screenAPIAvailable = false;
  try {
    screenAPIAvailable = Number.isFinite(window.screenX) && Number.isFinite(window.screenY);
  } catch (error) {
    screenAPIAvailable = false;
  }

  let prevScreenX = screenAPIAvailable ? window.screenX : 0;
  let prevScreenY = screenAPIAvailable ? window.screenY : 0;
  let winVelX = 0;
  let winVelY = 0;

  const obstacleSelectors = [];
  let obstacleRects = [];
  let obstaclesDirty = true;
  const obstacleROMap = new Map();

  function updateDebug() {
    debugEl.innerHTML =
      `beta (raw): ${rawBeta.toFixed(1)}°<br>` +
      `beta (smooth): ${smoothedBeta.toFixed(1)}°<br>` +
      `gamma (raw): ${rawGamma.toFixed(1)}°<br>` +
      `deviceAngle: ${deviceAngle.toFixed(1)}°<br>` +
      `snapAngle: ${snapAngle}°<br>` +
      `gravity.x: ${gravity.x.toFixed(5)}<br>` +
      `gravity.y: ${gravity.y.toFixed(5)}<br>` +
      `ball vx: ${ball.vx.toFixed(2)} vy: ${ball.vy.toFixed(2)}<br>` +
      `source: ${usingGyro ? '● gyro' : (screenAPIAvailable ? '○ window' : '○ static')}<br>` +
      `absOrientation: ${orientationIsAbsolute}<br>` +
      `v6-final`;
  }

  function normalizeDeltaDegrees(delta) {
    return ((delta + 180) % 360 + 360) % 360 - 180;
  }

  function applySnapAngle(newSnap) {
    newSnap = ((newSnap % 360) + 360) % 360;
    if (newSnap === snapAngle) return;

    const delta = normalizeDeltaDegrees(newSnap - snapAngle);
    const rad = -delta * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);

    const newVx = ball.vx * cos - ball.vy * sin;
    const newVy = ball.vx * sin + ball.vy * cos;
    ball.vx = newVx;
    ball.vy = newVy;

    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const px = ball.x - cx;
    const py = ball.y - cy;
    ball.x = px * cos - py * sin + cx;
    ball.y = px * sin + py * cos + cy;

    snapAngle = newSnap;
    divA.style.transform = `rotate(${snapAngle}deg)`;
    arrowA.style.transform = `translateX(-50%) rotate(${-snapAngle}deg)`;
    obstaclesDirty = true;
  }

  function resizeCanvas() {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;
    const dpr = window.devicePixelRatio || 1;

    canvas.width = Math.max(1, Math.round(w * dpr));
    canvas.height = Math.max(1, Math.round(h * dpr));
    canvas.style.width = `${w}px`;
    canvas.style.height = `${h}px`;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    canvasW = w;
    canvasH = h;

    ball.x = Math.max(ball.radius, Math.min(canvasW - ball.radius, ball.x || canvasW / 2));
    ball.y = Math.max(ball.radius, Math.min(canvasH - ball.radius, ball.y || canvasH / 4));
    obstaclesDirty = true;
  }

  function coverScale(containerW, containerH, innerW, innerH, angleRad) {
    const a = Math.abs(Math.cos(angleRad));
    const b = Math.abs(Math.sin(angleRad));
    const scaleX = containerW / (innerW * a + innerH * b);
    const scaleY = containerH / (innerW * b + innerH * a);
    return Math.min(scaleX, scaleY);
  }

  function updateDivBTransform() {
    const relAngle = deviceAngle - snapAngle;
    const relRad = relAngle * Math.PI / 180;
    const aW = divA.offsetWidth;
    const aH = divA.offsetHeight;
    const bW = divB.offsetWidth;
    const bH = divB.offsetHeight;
    const scale = coverScale(aW, aH, bW, bH, relRad);
    divB.style.transform = `translate(-50%, -50%) rotate(${relAngle}deg) scale(${scale})`;
  }

  function updateGravityFromOrientation(beta, gamma, absolute) {
    rawBeta = Number.isFinite(beta) ? beta : 0;
    rawGamma = Number.isFinite(gamma) ? gamma : 0;
    deviceAngle = rawGamma;
    orientationIsAbsolute = !!absolute;

    smoothedBeta = smoothedBeta * (1 - BETA_LP) + rawBeta * BETA_LP;

    if (smoothedBeta > BETA_HYST_POS) {
      if (lastBetaRegion === 'neg' && betaFlipArmed) {
        const nowPortrait = divA.offsetHeight > divA.offsetWidth;
        if (nowPortrait === isPortrait) applySnapAngle(snapAngle + 180);
        betaFlipArmed = false;
      }
      lastBetaRegion = 'pos';
    } else if (smoothedBeta < BETA_HYST_NEG) {
      if (lastBetaRegion === 'pos' && betaFlipArmed) {
        const nowPortrait = divA.offsetHeight > divA.offsetWidth;
        if (nowPortrait === isPortrait) applySnapAngle(snapAngle + 180);
        betaFlipArmed = false;
      }
      lastBetaRegion = 'neg';
    } else {
      lastBetaRegion = 'ambiguous';
      betaFlipArmed = true;
    }

    const bRad = rawBeta * Math.PI / 180;
    const gRad = rawGamma * Math.PI / 180;
    const worldGx = Math.sin(gRad) * GRAVITY_STRENGTH * 20;
    const worldGy = Math.cos(gRad) * Math.sin(bRad) * GRAVITY_STRENGTH * 20;

    const snapRad = -snapAngle * Math.PI / 180;
    const cos = Math.cos(snapRad);
    const sin = Math.sin(snapRad);
    gravity.x = worldGx * cos - worldGy * sin;
    gravity.y = worldGx * sin + worldGy * cos;

    if (Math.abs(gravity.x) < 0.0001 && Math.abs(gravity.y) < 0.0001) {
      gravity.x = 0;
      gravity.y = GRAVITY_STRENGTH;
    }

    updateDivBTransform();
  }

  function updateGravityFromWindow() {
    if (!screenAPIAvailable) {
      gravity.x = 0;
      gravity.y = GRAVITY_STRENGTH;
      return;
    }

    const dx = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenX - prevScreenX));
    const dy = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenY - prevScreenY));
    prevScreenX = window.screenX;
    prevScreenY = window.screenY;

    winVelX = winVelX * (1 - WIN_LOWPASS) + dx * WIN_LOWPASS;
    winVelY = winVelY * (1 - WIN_LOWPASS) + dy * WIN_LOWPASS;

    gravity.x = winVelX * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
    gravity.y = GRAVITY_STRENGTH + winVelY * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
  }

  function onDeviceOrientationAbsolute(event) {
    usingGyro = true;
    lastAbsoluteEventTs = performance.now();
    updateGravityFromOrientation(event.beta, event.gamma, true);
  }

  function onDeviceOrientation(event) {
    const now = performance.now();
    if (now - lastAbsoluteEventTs <= ABS_EVENT_TIMEOUT_MS) return;
    usingGyro = true;
    updateGravityFromOrientation(event.beta, event.gamma, !!event.absolute);
  }

  function startOrientation() {
    window.addEventListener('deviceorientationabsolute', onDeviceOrientationAbsolute);
    window.addEventListener('deviceorientation', onDeviceOrientation);
  }

  async function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const permission = await DeviceOrientationEvent.requestPermission();
        if (permission === 'granted') {
          overlay.classList.add('hidden');
          startOrientation();
        } else {
          overlay.querySelector('p').textContent = 'Permission denied. Tilt controls are unavailable.';
        }
      } catch (error) {
        overlay.querySelector('p').textContent = 'Permission denied. Tilt controls are unavailable.';
      }
    } else {
      overlay.classList.add('hidden');
      startOrientation();
    }
  }

  function screenRectToDivALocal(rect) {
    const aRect = divA.getBoundingClientRect();
    const aCx = aRect.left + aRect.width / 2;
    const aCy = aRect.top + aRect.height / 2;
    const rCx = rect.left + rect.width / 2;
    const rCy = rect.top + rect.height / 2;

    const rad = -snapAngle * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);
    const dx = rCx - aCx;
    const dy = rCy - aCy;
    const lx = dx * cos - dy * sin;
    const ly = dx * sin + dy * cos;

    const quarterTurns = (((Math.round(snapAngle / 90) % 4) + 4) % 4);
    const swapWH = quarterTurns % 2 === 1;
    const localW = swapWH ? rect.height : rect.width;
    const localH = swapWH ? rect.width : rect.height;

    return {
      x: lx - localW / 2 + canvasW / 2,
      y: ly - localH / 2 + canvasH / 2,
      w: localW,
      h: localH,
    };
  }

  function observeObstacle(el) {
    if (obstacleROMap.has(el)) return;
    const observer = new ResizeObserver(() => {
      obstaclesDirty = true;
    });
    observer.observe(el);
    obstacleROMap.set(el, observer);
  }

  function unobserveObstacle(el) {
    const observer = obstacleROMap.get(el);
    if (!observer) return;
    observer.disconnect();
    obstacleROMap.delete(el);
  }

  function collectObstacleElements() {
    const allElements = new Set();
    for (const sel of obstacleSelectors) {
      document.querySelectorAll(sel).forEach((el) => allElements.add(el));
    }
    document.querySelectorAll('.obstacle').forEach((el) => allElements.add(el));
    return allElements;
  }

  function refreshObstacles() {
    if (!obstaclesDirty) return;
    obstaclesDirty = false;
    obstacleRects = [];

    const elements = collectObstacleElements();

    for (const tracked of Array.from(obstacleROMap.keys())) {
      if (!tracked.isConnected || !elements.has(tracked)) unobserveObstacle(tracked);
    }

    for (const el of elements) {
      const rect = el.getBoundingClientRect();
      obstacleRects.push(screenRectToDivALocal(rect));
      observeObstacle(el);
    }
  }

  function addObstacle(cssSelector) {
    if (!obstacleSelectors.includes(cssSelector)) {
      obstacleSelectors.push(cssSelector);
      obstaclesDirty = true;
    }
  }

  function resolveWallCollision() {
    const r = ball.radius;
    if (ball.x - r < 0) {
      ball.x = r;
      ball.vx = Math.abs(ball.vx) * RESTITUTION;
    }
    if (ball.x + r > canvasW) {
      ball.x = canvasW - r;
      ball.vx = -Math.abs(ball.vx) * RESTITUTION;
    }
    if (ball.y - r < 0) {
      ball.y = r;
      ball.vy = Math.abs(ball.vy) * RESTITUTION;
    }
    if (ball.y + r > canvasH) {
      ball.y = canvasH - r;
      ball.vy = -Math.abs(ball.vy) * RESTITUTION;
      ball.vx *= FRICTION;
    }
  }

  function resolveObstacleCollisions() {
    for (const obs of obstacleRects) {
      const cx = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
      const cy = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ball.radius && dist > 0) {
        const pen = ball.radius - dist;
        const nx = dx / dist;
        const ny = dy / dist;
        ball.x += nx * pen;
        ball.y += ny * pen;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          ball.vx -= (1 + RESTITUTION) * dot * nx;
          ball.vy -= (1 + RESTITUTION) * dot * ny;
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;
        }
      }
    }
  }

  function updatePhysics(dt) {
    const safeDt = Math.min(dt, 50);
    ball.vx += gravity.x * safeDt;
    ball.vy += gravity.y * safeDt;
    ball.vx *= DAMPING;
    ball.vy *= DAMPING;
    ball.x += ball.vx * safeDt;
    ball.y += ball.vy * safeDt;
    resolveWallCollision();
    resolveObstacleCollisions();
  }

  function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 4;

    const grad = ctx.createRadialGradient(
      ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
      ball.x, ball.y, ball.radius
    );
    grad.addColorStop(0, '#a0cfff');
    grad.addColorStop(0.5, '#4f8ef7');
    grad.addColorStop(1, '#1a3a7a');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (const obs of obstacleRects) ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.restore();
  }

  function loop(timestamp) {
    if (destroyed) return;
    rafId = requestAnimationFrame(loop);

    if (lastTime === null) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (!usingGyro) updateGravityFromWindow();
    refreshObstacles();
    updatePhysics(dt);
    render();
    updateDebug();
  }

  function init() {
    if (initialized || destroyed) return;
    initialized = true;
    resizeCanvas();
    ball.x = canvasW / 2;
    ball.y = canvasH / 4;
    ball.vx = 1.5;
    ball.vy = 0;
    rafId = requestAnimationFrame(loop);
  }

  const layoutRO = new ResizeObserver(() => {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;
    if (w === 0 || h === 0) return;

    const nowPortrait = h > w;
    if (nowPortrait !== isPortrait) {
      const delta = rawGamma < 0 ? -90 : 90;
      applySnapAngle(snapAngle + delta);
      isPortrait = nowPortrait;
    }

    resizeCanvas();
    if (!initialized) init();
  });
  layoutRO.observe(divA);

  const obstacleMO = new MutationObserver((mutations) => {
    let changed = false;
    for (const mutation of mutations) {
      mutation.addedNodes.forEach((node) => {
        if (node.nodeType !== 1) return;
        if (node.matches && node.matches('.obstacle')) changed = true;
        if (node.querySelectorAll) {
          const descendants = node.querySelectorAll('.obstacle');
          if (descendants.length) changed = true;
        }
      });
      mutation.removedNodes.forEach((node) => {
        if (node.nodeType !== 1) return;
        if (node.matches && node.matches('.obstacle')) {
          unobserveObstacle(node);
          changed = true;
        }
        if (node.querySelectorAll) {
          node.querySelectorAll('.obstacle').forEach((el) => unobserveObstacle(el));
          if (node.querySelectorAll('.obstacle').length) changed = true;
        }
      });
    }
    if (changed) obstaclesDirty = true;
  });
  obstacleMO.observe(obstaclesLayer, { childList: true, subtree: true });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      lastTime = null;
    } else if (!destroyed && rafId === null) {
      rafId = requestAnimationFrame(loop);
    }
  });

  permBtn.addEventListener('click', requestOrientationPermission);

  if (typeof DeviceOrientationEvent === 'undefined' || typeof DeviceOrientationEvent.requestPermission !== 'function') {
    overlay.classList.add('hidden');
    startOrientation();
  }

  setTimeout(init, 100);

  function destroy() {
    destroyed = true;
    if (rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
    layoutRO.disconnect();
    obstacleMO.disconnect();
    for (const observer of obstacleROMap.values()) observer.disconnect();
    obstacleROMap.clear();
    window.removeEventListener('deviceorientationabsolute', onDeviceOrientationAbsolute);
    window.removeEventListener('deviceorientation', onDeviceOrientation);
  }

  window.addEventListener('pagehide', destroy, { once: true });

  window.physicsApp = {
    addObstacle,
    getBall: () => ({ ...ball }),
    stop: () => {
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      lastTime = null;
    },
    start: () => {
      if (!destroyed && rafId === null) {
        lastTime = null;
        rafId = requestAnimationFrame(loop);
      }
    },
    destroy,
  };
})();
</script>
</body>
</html>
