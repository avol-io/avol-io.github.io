
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Ball</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0f0f0f;
  }

  /*
   * DIV A — full-viewport fixed container.
   * snapAngle updated only on OS-level orientation change (ResizeObserver h/w flip).
   * No CSS transition — snap is instant (OS already animated the rotation).
   * All physics children (canvas, obstacles) live in this coordinate frame.
   */
  #div-a {
    position: fixed;
    inset: 0;
  }

  /*
   * DIV B — purely decorative rotating rectangle, child of div-a.
   * Rotates continuously at relAngle = deviceAngle - snapAngle.
   * Natural size = div-a minus 40px each axis (20px gap per side).
   * JS coverScale keeps it fitting inside div-a as it rotates.
   * No physics involvement — pointer-events disabled.
   */
  #div-b {
    position: absolute;
    top: 50%; left: 50%;
    translate: -50% -50%;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    transform-origin: center center;
    pointer-events: none;
  }

  /*
   * BALL CANVAS — fills div-a completely.
   * Physics coordinate space = div-a space.
   */
  #ball-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 10;
  }

  /*
   * OBSTACLES LAYER — axis-aligned in div-a space.
   * Snaps with div-a, never follows div-b's continuous rotation.
   */
  #obstacles-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  /* Counter-rotates inside div-a to always point world-down */
  #gravity-arrow-a {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: white;
    opacity: 0.25;
    user-select: none;
    pointer-events: none;
    z-index: 30;
  }

  /* iOS permission overlay */
  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    color: white;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 24px;
  }
  #permission-overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #permission-btn {
    padding: 12px 32px;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
  }
  #permission-overlay.hidden { display: none; }

  /* Debug panel */
  #debug-info {
    position: fixed;
    top: 8px; left: 8px;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    z-index: 200;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 6px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <p>This experience needs access to device orientation sensors.</p>
  <button id="permission-btn">Enable Motion</button>
</div>

<div id="div-a">
  <div id="div-b"></div>
  <canvas id="ball-canvas"></canvas>
  <div id="obstacles-layer">
    <!-- Demo obstacle — remove or replace -->
    <div class="obstacle" style="
      position:absolute; left:20%; top:40%;
      width:60%; height:12px;
      background: rgba(255,255,255,0.12);
      border-radius:6px;
    "></div>
  </div>
  <div id="gravity-arrow-a">↓</div>
</div>

<div id="debug-info">waiting for sensor…</div>

<script>
(function() {
  'use strict';

  // ─── Physics constants ───────────────────────────────────────────────────────
  const BALL_RADIUS      = 18;
  const RESTITUTION      = 0.72;   // energy retained on bounce
  const FRICTION         = 0.985;  // tangential damping on wall contact
  const DAMPING          = 0.999;  // per-frame air resistance
  const GRAVITY_STRENGTH = 0.0035; // base gravity scale
  const WIN_ACCEL_SCALE  = 0.18;   // window movement → gravity multiplier (desktop)
  const WIN_LOWPASS      = 0.12;   // smoothing factor for window velocity
  const MAX_WIN_DELTA    = 40;     // px clamp for window position delta

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const divA    = document.getElementById('div-a');
  const divB    = document.getElementById('div-b');
  const canvas  = document.getElementById('ball-canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('permission-overlay');
  const permBtn = document.getElementById('permission-btn');
  const debugEl = document.getElementById('debug-info');
  const arrowA  = document.getElementById('gravity-arrow-a');

  // ─── World dimensions ────────────────────────────────────────────────────────
  let canvasW = 0, canvasH = 0;

  // ─── Gravity vector in div-a coordinate frame (px/ms²) ──────────────────────
  const gravity = { x: 0, y: GRAVITY_STRENGTH };

  // ─── Ball state ──────────────────────────────────────────────────────────────
  const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: BALL_RADIUS };

  // ─── Sensor state ────────────────────────────────────────────────────────────
  let rawBeta     = 0;   // beta from deviceorientation (degrees)
  let rawGamma    = 0;   // gamma from deviceorientation (degrees)
  let deviceAngle = 0;   // gamma, used for div-b continuous rotation
  let snapAngle   = 0;   // current div-a orientation: 0 / 90 / 180 / 270
  let usingGyro   = false;

  // ─── 180° flip detection ─────────────────────────────────────────────────────
  // Tracks whether the device is "beta-positive" (normal portrait / normal landscape)
  // vs "beta-negative" (upside-down portrait / upside-down landscape).
  // A sign flip while h/w ratio is unchanged signals a 180° rotation.
  let lastBetaPositive = true; // true = beta >= 0

  // ─── Orientation tracking for resize-based snap ──────────────────────────────
  // We detect OS-level orientation changes by watching when div-a's h/w ratio
  // flips (portrait ↔ landscape). At that moment rawGamma tells us the direction.
  let isPortrait = window.innerHeight > window.innerWidth;

  // ─── Desktop window movement state ──────────────────────────────────────────
  let prevScreenX = window.screenX;
  let prevScreenY = window.screenY;
  let winVelX = 0, winVelY = 0;

  // ─── Obstacles ───────────────────────────────────────────────────────────────
  const obstacleSelectors = [];
  let   obstacleRects     = [];


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEBUG PANEL — remove updateDebug() call in loop() for production
  // ═══════════════════════════════════════════════════════════════════════════
  function updateDebug() {
    debugEl.innerHTML =
      `beta (raw): ${rawBeta.toFixed(1)}°<br>` +
      `gamma (raw): ${rawGamma.toFixed(1)}°<br>` +
      `deviceAngle: ${deviceAngle.toFixed(1)}°<br>` +
      `snapAngle: ${snapAngle}°<br>` +
      `gravity.x: ${gravity.x.toFixed(5)}<br>` +
      `gravity.y: ${gravity.y.toFixed(5)}<br>` +
      `ball vx: ${ball.vx.toFixed(2)} vy: ${ball.vy.toFixed(2)}<br>` +
      `source: ${usingGyro ? '● gyro' : '○ window'}<br>` +
      `v4`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  SNAP APPLICATION
  //  Called only on OS-level orientation events (resize h/w flip or 180° beta flip).
  //  No CSS transition on div-a — OS already animated the screen rotation.
  //
  //  On snap:
  //  1. Ball velocity is counter-rotated by -delta so trajectory feels continuous.
  //  2. Ball position is rotated around canvas center so it stays at the same
  //     world location (e.g. 10px from corner A before snap = 10px after).
  //  3. div-a CSS transform updated instantly.
  //  4. Gravity arrow counter-rotated to always point world-down.
  // ═══════════════════════════════════════════════════════════════════════════
  function applySnapAngle(newSnap) {
    // Normalize to 0–359
    newSnap = ((newSnap % 360) + 360) % 360;
    if (newSnap === snapAngle) return;

    const delta = newSnap - snapAngle;
    const rad   = -delta * Math.PI / 180;
    const cos   = Math.cos(rad);
    const sin   = Math.sin(rad);

    // Counter-rotate velocity — ball continues its physical trajectory
    const newVx = ball.vx * cos - ball.vy * sin;
    const newVy = ball.vx * sin + ball.vy * cos;
    ball.vx = newVx;
    ball.vy = newVy;

    // Rotate position around canvas center — ball stays at same world location
    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const px = ball.x - cx;
    const py = ball.y - cy;
    ball.x = px * cos - py * sin + cx;
    ball.y = px * sin + py * cos + cy;

    snapAngle = newSnap;

    // Instant snap — no transition (OS already handled the animation)
    divA.style.transform   = `rotate(${snapAngle}deg)`;
    arrowA.style.transform = `translateX(-50%) rotate(${-snapAngle}deg)`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  CANVAS RESIZE
  //  Uses offsetWidth/offsetHeight — layout dimensions, transform-independent.
  //  getBoundingClientRect() returns post-transform size and causes
  //  browser-specific inconsistencies when a CSS transform is active.
  // ═══════════════════════════════════════════════════════════════════════════
  function resizeCanvas() {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;

    const dpr = window.devicePixelRatio || 1;
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);

    canvasW = w;
    canvasH = h;

    ball.x = Math.max(ball.radius, Math.min(canvasW - ball.radius, ball.x || canvasW / 2));
    ball.y = Math.max(ball.radius, Math.min(canvasH - ball.radius, ball.y || canvasH / 4));
  }

  // ═══════════════════════════════════════════════════════════════════════════
  //  RESIZE OBSERVER — orientation change detection
  //
  //  Portrait ↔ landscape: h/w ratio flips → use rawGamma sign to determine
  //  rotation direction (+90 or -90).
  //
  //  180° flip: h/w ratio unchanged but beta sign inverts → add 180°.
  //  Detected separately in updateGravityFromOrientation() via lastBetaPositive.
  // ═══════════════════════════════════════════════════════════════════════════
  const ro = new ResizeObserver(() => {
    const nowPortrait = divA.offsetHeight > divA.offsetWidth;

    if (nowPortrait !== isPortrait) {
      // h/w ratio flipped → 90° rotation occurred.
      // rawGamma sign at the moment of resize tells us the direction:
      //   gamma < 0 → rotated counter-clockwise → snapAngle decreases
      //   gamma > 0 → rotated clockwise         → snapAngle increases
      const delta = rawGamma < 0 ? -90 : 90;
      applySnapAngle(snapAngle + delta);
      isPortrait = nowPortrait;
    }

    resizeCanvas();
  });
  ro.observe(divA);


  // ═══════════════════════════════════════════════════════════════════════════
  //  DIV B TRANSFORM
  //  div-b rotates continuously at relAngle = deviceAngle - snapAngle.
  //  Scaled with coverScale (fit/min) so it never overflows div-a.
  //  The 20px gap is encoded in its natural CSS size (calc(100% - 40px)).
  // ═══════════════════════════════════════════════════════════════════════════
  function coverScale(containerW, containerH, innerW, innerH, angleRad) {
    // Minimum scale to fit a rotated innerW×innerH rectangle inside the container.
    const a = Math.abs(Math.cos(angleRad));
    const b = Math.abs(Math.sin(angleRad));
    const scaleX = containerW / (innerW * a + innerH * b);
    const scaleY = containerH / (innerW * b + innerH * a);
    return Math.min(scaleX, scaleY);
  }

  function updateDivBTransform() {
    const relAngle = deviceAngle - snapAngle;
    const relRad   = relAngle * Math.PI / 180;

    const aW = divA.offsetWidth;
    const aH = divA.offsetHeight;
    const bW = divB.offsetWidth;
    const bH = divB.offsetHeight;

    const scale = coverScale(aW, aH, bW, bH, relRad);
    divB.style.transform = `rotate(${relAngle}deg) scale(${scale})`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — MOBILE (device orientation)
  //
  //  Portrait reference: beta=90 is upright. We offset by -90 so:
  //    betaOffset = 0  → phone perfectly vertical → no spurious Y gravity
  //    betaOffset > 0  → tilting top toward user
  //    betaOffset < 0  → tilting top away
  //
  //  World-frame gravity is projected into div-a's coordinate frame
  //  by rotating by -snapAngle. This decouples physics from snap events:
  //  the ball never "feels" a snap, only real-world gravity direction.
  //
  //  180° detection: if beta sign flips while h/w ratio is unchanged
  //  (isPortrait hasn't changed), the device was flipped upside-down.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromOrientation(beta, gamma) {
    rawBeta     = beta  || 0;
    rawGamma    = gamma || 0;
    deviceAngle = rawGamma;

    // ── 180° flip detection ────────────────────────────────────────────────
    // beta > 0 in normal orientation, beta < 0 when flipped 180°.
    // We only act on the sign flip — not on continuous beta changes.
    const betaPositive = rawBeta >= 0;
    if (betaPositive !== lastBetaPositive) {
      // Sign changed — 180° flip. Only valid if h/w ratio didn't also change
      // (if it did, the ResizeObserver already handled it as a 90° snap).
      const nowPortrait = divA.offsetHeight > divA.offsetWidth;
      if (nowPortrait === isPortrait) {
        applySnapAngle(snapAngle + 180);
      }
      lastBetaPositive = betaPositive;
    }

    // ── Gravity projection ─────────────────────────────────────────────────
    const betaOffset = Math.max(-90, Math.min(90, rawBeta - 90));
    const bRad = betaOffset * Math.PI / 180;
    const gRad = Math.max(-90, Math.min(90, rawGamma)) * Math.PI / 180;

    // World-frame gravity vector
    const worldGx =  Math.sin(gRad) * GRAVITY_STRENGTH * 20;
    const worldGy =  Math.sin(bRad) * GRAVITY_STRENGTH * 20;

    // Rotate into div-a frame by -snapAngle
    const snapRad = -snapAngle * Math.PI / 180;
    const cos     = Math.cos(snapRad);
    const sin     = Math.sin(snapRad);
    gravity.x = worldGx * cos - worldGy * sin;
    gravity.y = worldGx * sin + worldGy * cos;

    if (Math.abs(gravity.x) < 0.0001 && Math.abs(gravity.y) < 0.0001) {
      gravity.y = GRAVITY_STRENGTH; // minimum gravity when device is flat
    }

    updateDivBTransform();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — DESKTOP (window movement fallback)
  //  Simulates gravity by tracking browser window position on screen.
  //  Moving window right → ball feels pull to the right, etc.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromWindow() {
    const dx = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenX - prevScreenX));
    const dy = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenY - prevScreenY));
    prevScreenX = window.screenX;
    prevScreenY = window.screenY;

    winVelX = winVelX * (1 - WIN_LOWPASS) + dx * WIN_LOWPASS;
    winVelY = winVelY * (1 - WIN_LOWPASS) + dy * WIN_LOWPASS;

    gravity.x = winVelX * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
    gravity.y = GRAVITY_STRENGTH + winVelY * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEVICE ORIENTATION SETUP
  //  iOS 13+ requires explicit user permission for DeviceOrientationEvent.
  // ═══════════════════════════════════════════════════════════════════════════
  function startOrientation() {
    window.addEventListener('deviceorientation', (e) => {
      usingGyro = true;
      updateGravityFromOrientation(e.beta, e.gamma);
    });
  }

  permBtn.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          overlay.classList.add('hidden');
          startOrientation();
        }
      } catch(e) {
        overlay.querySelector('p').textContent = "Permission denied. Tilt won't work.";
      }
    } else {
      overlay.classList.add('hidden');
      startOrientation();
    }
  });

  if (typeof DeviceOrientationEvent === 'undefined' ||
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    overlay.classList.add('hidden');
    startOrientation();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  OBSTACLES
  //  DOM elements inside #obstacles-layer, axis-aligned in div-a space.
  //  Positions read via getBoundingClientRect relative to canvas rect.
  //  canvas has no own transform, so the subtraction correctly maps
  //  screen-space obstacle positions into canvas (div-a) coordinates.
  // ═══════════════════════════════════════════════════════════════════════════
  function addObstacle(cssSelector) {
    if (!obstacleSelectors.includes(cssSelector)) obstacleSelectors.push(cssSelector);
  }

  function refreshObstacles() {
    const cr = canvas.getBoundingClientRect();
    obstacleRects = [];

    for (const sel of obstacleSelectors) {
      document.querySelectorAll(sel).forEach(el => {
        const r = el.getBoundingClientRect();
        obstacleRects.push({ x: r.left - cr.left, y: r.top - cr.top, w: r.width, h: r.height });
      });
    }

    document.querySelectorAll('.obstacle').forEach(el => {
      const r = el.getBoundingClientRect();
      obstacleRects.push({ x: r.left - cr.left, y: r.top - cr.top, w: r.width, h: r.height });
    });
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  PHYSICS
  // ═══════════════════════════════════════════════════════════════════════════
  function resolveWallCollision() {
    const r = ball.radius;
    if (ball.x - r < 0)       { ball.x = r;           ball.vx =  Math.abs(ball.vx) * RESTITUTION; }
    if (ball.x + r > canvasW) { ball.x = canvasW - r;  ball.vx = -Math.abs(ball.vx) * RESTITUTION; }
    if (ball.y - r < 0)       { ball.y = r;            ball.vy =  Math.abs(ball.vy) * RESTITUTION; }
    if (ball.y + r > canvasH) {
      ball.y  = canvasH - r;
      ball.vy = -Math.abs(ball.vy) * RESTITUTION;
      ball.vx *= FRICTION;
    }
  }

  function resolveObstacleCollisions() {
    for (const obs of obstacleRects) {
      // Closest point on AABB to ball center
      const cx   = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
      const cy   = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
      const dx   = ball.x - cx;
      const dy   = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ball.radius && dist > 0) {
        const pen = ball.radius - dist;
        const nx  = dx / dist;
        const ny  = dy / dist;
        ball.x += nx * pen;
        ball.y += ny * pen;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          ball.vx -= (1 + RESTITUTION) * dot * nx;
          ball.vy -= (1 + RESTITUTION) * dot * ny;
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;
        }
      }
    }
  }

  function updatePhysics(dt) {
    // Cap dt to avoid spiral-of-death when tab resumes from background
    const safeDt = Math.min(dt, 32);

    // Symplectic Euler: velocity first, then position (more stable than explicit)
    ball.vx += gravity.x * safeDt;
    ball.vy += gravity.y * safeDt;
    ball.vx *= DAMPING;
    ball.vy *= DAMPING;
    ball.x  += ball.vx * safeDt;
    ball.y  += ball.vy * safeDt;

    resolveWallCollision();
    resolveObstacleCollisions();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  RENDERING
  // ═══════════════════════════════════════════════════════════════════════════
  function render() {
    ctx.clearRect(0, 0, canvasW, canvasH);

    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur    = 12;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 4;

    const grad = ctx.createRadialGradient(
      ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
      ball.x, ball.y, ball.radius
    );
    grad.addColorStop(0, '#a0cfff');
    grad.addColorStop(0.5, '#4f8ef7');
    grad.addColorStop(1, '#1a3a7a');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Obstacle debug outlines — remove in production
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    for (const obs of obstacleRects) ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.restore();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  MAIN LOOP
  // ═══════════════════════════════════════════════════════════════════════════
  let lastTime   = null;
  let frameCount = 0;

  function loop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime  = timestamp;

    if (!usingGyro) updateGravityFromWindow();
    if (frameCount % 10 === 0) refreshObstacles(); // cheap enough, handles layout shifts
    frameCount++;

    updatePhysics(dt);
    render();
    updateDebug();

    requestAnimationFrame(loop);
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  INIT
  // ═══════════════════════════════════════════════════════════════════════════
  function init() {
    resizeCanvas();
    ball.x  = canvasW / 2;
    ball.y  = canvasH / 4;
    ball.vx = 1.5;
    ball.vy = 0;
    requestAnimationFrame(loop);
  }

  // Small delay so ResizeObserver fires at least once before reading dimensions
  setTimeout(init, 50);


  // ═══════════════════════════════════════════════════════════════════════════
  //  PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════════
  window.physicsApp = {
    addObstacle,               // physicsApp.addObstacle('#my-element')
    getBall: () => ({ ...ball }), // read-only snapshot of ball state
  };

})();
</script>
</body>
</html>
