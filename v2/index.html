<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Ball</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0f0f0f;
  }

  #div-a {
    position: fixed;
    inset: 0;
  }

  #div-b {
    position: absolute;
    top: 50%; left: 50%;
    translate: -50% -50%;
    width: calc(100% - 40px);
    height: calc(100% - 40px);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    transform-origin: center center;
    pointer-events: none;
    color:white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  #ball-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 10;
  }

  #obstacles-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }

  #gravity-arrow-a {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: white;
    opacity: 0.25;
    user-select: none;
    pointer-events: none;
    z-index: 30;
  }

  #permission-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 1000;
    color: white;
    font-family: system-ui, sans-serif;
    text-align: center;
    padding: 24px;
  }
  #permission-overlay p { font-size: 16px; opacity: 0.8; max-width: 300px; }
  #permission-btn {
    padding: 12px 32px;
    background: #4f8ef7;
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
  }
  #permission-overlay.hidden { display: none; }

  #debug-info {
    position: fixed;
    top: 8px; left: 8px;
    font-family: monospace;
    font-size: 11px;
    line-height: 1.6;
    color: rgba(255,255,255,0.55);
    z-index: 200;
    pointer-events: none;
    background: rgba(0,0,0,0.4);
    padding: 6px 8px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="permission-overlay">
  <p>This experience needs access to device orientation sensors.</p>
  <button id="permission-btn">Enable Motion</button>
</div>

<div id="div-a">
  <div id="div-b">↓</div>
  <canvas id="ball-canvas"></canvas>
  <div id="obstacles-layer">
    <!-- Demo obstacle — remove or replace -->
    <div class="obstacle" style="
      position:absolute; left:20%; top:40%;
      width:60%; height:12px;
      background: rgba(255,255,255,0.12);
      border-radius:6px;
    "></div>
  </div>
  <div id="gravity-arrow-a">↓</div>
</div>

<div id="debug-info">waiting for sensor…</div>

<script>
(function() {
  'use strict';

  // ─── Physics constants ───────────────────────────────────────────────────────
  const BALL_RADIUS      = 18;
  const RESTITUTION      = 0.72;
  const FRICTION         = 0.985;
  const DAMPING          = 0.999;
  const GRAVITY_STRENGTH = 0.0035;
  const WIN_ACCEL_SCALE  = 0.18;
  const WIN_LOWPASS      = 0.12;
  const MAX_WIN_DELTA    = 40;

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const divA    = document.getElementById('div-a');
  const divB    = document.getElementById('div-b');
  const canvas  = document.getElementById('ball-canvas');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('permission-overlay');
  const permBtn = document.getElementById('permission-btn');
  const debugEl = document.getElementById('debug-info');
  const arrowA  = document.getElementById('gravity-arrow-a');

  // ─── World dimensions ────────────────────────────────────────────────────────
  let canvasW = 0, canvasH = 0;

  // ─── Gravity vector in div-a coordinate frame (px/ms²) ──────────────────────
  const gravity = { x: 0, y: GRAVITY_STRENGTH };

  // ─── Ball state ──────────────────────────────────────────────────────────────
  const ball = { x: 0, y: 0, vx: 0, vy: 0, radius: BALL_RADIUS };

  // ─── Sensor state ────────────────────────────────────────────────────────────
  let rawBeta     = 0;
  let rawGamma    = 0;
  let deviceAngle = 0;
  let snapAngle   = 0;
  let usingGyro   = false;

  // ─── 180° flip detection ─────────────────────────────────────────────────────
  // FIX #4: Track a low-pass filtered beta to avoid false 180° snaps during
  // normal tilting. Only trigger when the smoothed value clearly crosses the
  // threshold (hysteresis ±20°), not on every zero-crossing.
  let smoothedBeta    = 0;
  let betaFlipArmed   = true;   // true = we can accept the next crossing
  const BETA_LP       = 0.08;   // low-pass factor for beta smoothing
  const BETA_HYST_POS = 20;     // must exceed +20 to be considered "positive"
  const BETA_HYST_NEG = -20;    // must be below -20 to be considered "negative"
  let lastBetaRegion  = 'pos';  // 'pos' | 'neg' | 'ambiguous'

  // ─── Orientation tracking for resize-based snap ──────────────────────────────
  let isPortrait = window.innerHeight > window.innerWidth;

  // ─── Desktop window movement state ──────────────────────────────────────────
  // FIX #7: Guard screenX/Y access — not available in iframes / some PWA contexts.
  let screenAPIAvailable = false;
  try {
    const tx = window.screenX;
    const ty = window.screenY;
    // If we read two different frames and they differ or if the properties exist at all
    screenAPIAvailable = (typeof tx === 'number' && typeof ty === 'number');
  } catch(e) {
    screenAPIAvailable = false;
  }
  let prevScreenX = screenAPIAvailable ? window.screenX : 0;
  let prevScreenY = screenAPIAvailable ? window.screenY : 0;
  let winVelX = 0, winVelY = 0;

  // ─── RAF handle for cleanup ─────────────────────────────────────────────────
  // FIX #5: Store RAF id so the loop can be cancelled.
  let rafId = null;

  // ─── Obstacles ───────────────────────────────────────────────────────────────
  const obstacleSelectors = [];
  let   obstacleRects     = [];

  // FIX #9: ResizeObserver per-obstacle to avoid per-frame querySelectorAll +
  // getBoundingClientRect layout thrashing. We rebuild rects only on actual
  // layout changes, not every 10 frames.
  let   obstaclesDirty  = true;   // set true whenever any obstacle moves/resizes
  const obstacleROMap   = new Map(); // element → ResizeObserver

  // ─── Absolute orientation detection ─────────────────────────────────────────
  // FIX #10: Detect whether the browser fires absolute deviceorientation events
  // (absolute=true) vs relative. On Android Chrome, absolute events have
  // compassHeading available and absolute===true; raw beta/gamma are the same
  // but we log it for the debug panel.
  let orientationIsAbsolute = false;


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEBUG PANEL
  // ═══════════════════════════════════════════════════════════════════════════
  function updateDebug() {
    debugEl.innerHTML =
      `beta (raw): ${rawBeta.toFixed(1)}°<br>` +
      `beta (smooth): ${smoothedBeta.toFixed(1)}°<br>` +
      `gamma (raw): ${rawGamma.toFixed(1)}°<br>` +
      `deviceAngle: ${deviceAngle.toFixed(1)}°<br>` +
      `snapAngle: ${snapAngle}°<br>` +
      `gravity.x: ${gravity.x.toFixed(5)}<br>` +
      `gravity.y: ${gravity.y.toFixed(5)}<br>` +
      `ball vx: ${ball.vx.toFixed(2)} vy: ${ball.vy.toFixed(2)}<br>` +
      `source: ${usingGyro ? '● gyro' : (screenAPIAvailable ? '○ window' : '○ static')}<br>` +
      `absOrientation: ${orientationIsAbsolute}<br>` +
      `v5-fixed`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  SNAP APPLICATION
  // ═══════════════════════════════════════════════════════════════════════════
  function applySnapAngle(newSnap) {
    newSnap = ((newSnap % 360) + 360) % 360;
    if (newSnap === snapAngle) return;

    const delta = newSnap - snapAngle;
    const rad   = -delta * Math.PI / 180;
    const cos   = Math.cos(rad);
    const sin   = Math.sin(rad);

    const newVx = ball.vx * cos - ball.vy * sin;
    const newVy = ball.vx * sin + ball.vy * cos;
    ball.vx = newVx;
    ball.vy = newVy;

    const cx = canvasW / 2;
    const cy = canvasH / 2;
    const px = ball.x - cx;
    const py = ball.y - cy;
    ball.x = px * cos - py * sin + cx;
    ball.y = px * sin + py * cos + cy;

    snapAngle = newSnap;

    divA.style.transform   = `rotate(${snapAngle}deg)`;
    arrowA.style.transform = `translateX(-50%) rotate(${-snapAngle}deg)`;

    // Obstacles moved relative to the rotated frame — mark dirty
    obstaclesDirty = true;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  CANVAS RESIZE
  //  FIX #1: Use ctx.setTransform() instead of ctx.scale() to avoid
  //  accumulating the DPR scale on every resize call.
  // ═══════════════════════════════════════════════════════════════════════════
  function resizeCanvas() {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;
    const dpr = window.devicePixelRatio || 1;

    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';

    // FIX #1: setTransform resets the matrix before applying DPR scale,
    // so repeated calls never accumulate extra scaling.
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    canvasW = w;
    canvasH = h;

    ball.x = Math.max(ball.radius, Math.min(canvasW - ball.radius, ball.x || canvasW / 2));
    ball.y = Math.max(ball.radius, Math.min(canvasH - ball.radius, ball.y || canvasH / 4));

    // Layout changed — obstacle rects need refresh
    obstaclesDirty = true;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  RESIZE OBSERVER — orientation change detection
  //
  //  FIX #6: Distinguish between a genuine orientation flip (h/w ratio change)
  //  and other resize events (virtual keyboard, browser chrome changes).
  //  We guard with a minimum dimension-ratio change threshold to avoid false
  //  orientation snaps triggered by soft keyboard or address-bar hide/show.
  // ═══════════════════════════════════════════════════════════════════════════
  const ro = new ResizeObserver(() => {
    const w = divA.offsetWidth;
    const h = divA.offsetHeight;
    if (w === 0 || h === 0) return;

    const nowPortrait = h > w;

    // FIX #6: Only treat this as an orientation flip if the ratio crossed the
    // square boundary (i.e. was portrait and is now landscape or vice versa).
    // Small changes (keyboard, scrollbar) won't flip h > w.
    if (nowPortrait !== isPortrait) {
      const delta = rawGamma < 0 ? -90 : 90;
      applySnapAngle(snapAngle + delta);
      isPortrait = nowPortrait;
    }

    resizeCanvas();
  });
  ro.observe(divA);


  // ═══════════════════════════════════════════════════════════════════════════
  //  DIV B TRANSFORM
  // ═══════════════════════════════════════════════════════════════════════════
  function coverScale(containerW, containerH, innerW, innerH, angleRad) {
    const a = Math.abs(Math.cos(angleRad));
    const b = Math.abs(Math.sin(angleRad));
    const scaleX = containerW / (innerW * a + innerH * b);
    const scaleY = containerH / (innerW * b + innerH * a);
    return Math.min(scaleX, scaleY);
  }

  function updateDivBTransform() {
    const relAngle = deviceAngle - snapAngle;
    const relRad   = relAngle * Math.PI / 180;
    const aW = divA.offsetWidth;
    const aH = divA.offsetHeight;
    const bW = divB.offsetWidth;
    const bH = divB.offsetHeight;
    const scale = coverScale(aW, aH, bW, bH, relRad);
    divB.style.transform = `rotate(${relAngle}deg) scale(${scale})`;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — MOBILE
  //
  //  FIX #4: 180° flip detection replaced with hysteresis + low-pass filter.
  //  - smoothedBeta tracks a low-pass-filtered beta.
  //  - A flip is only registered when smoothedBeta clearly crosses into the
  //    opposite region (>+BETA_HYST_POS or <BETA_HYST_NEG), preventing
  //    false triggers during normal near-horizontal holding.
  //  - Once a flip fires, betaFlipArmed=false until smoothedBeta returns to
  //    the ambiguous zone, preventing double-fires.
  //
  //  FIX #10: We accept both relative and absolute deviceorientation.
  //  Absolute events have the same beta/gamma semantics for tilt, so physics
  //  is unaffected. We just record the flag for debug.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromOrientation(beta, gamma, absolute) {
    rawBeta     = beta  || 0;
    rawGamma    = gamma || 0;
    deviceAngle = rawGamma;
    orientationIsAbsolute = !!absolute;

    // FIX #4: low-pass filter beta, then apply hysteresis for 180° detection
    smoothedBeta = smoothedBeta * (1 - BETA_LP) + rawBeta * BETA_LP;

    if (smoothedBeta > BETA_HYST_POS) {
      if (lastBetaRegion === 'neg' && betaFlipArmed) {
        const nowPortrait = divA.offsetHeight > divA.offsetWidth;
        if (nowPortrait === isPortrait) {
          applySnapAngle(snapAngle + 180);
        }
        betaFlipArmed = false;
      }
      lastBetaRegion = 'pos';
    } else if (smoothedBeta < BETA_HYST_NEG) {
      if (lastBetaRegion === 'pos' && betaFlipArmed) {
        const nowPortrait = divA.offsetHeight > divA.offsetWidth;
        if (nowPortrait === isPortrait) {
          applySnapAngle(snapAngle + 180);
        }
        betaFlipArmed = false;
      }
      lastBetaRegion = 'neg';
    } else {
      // In ambiguous zone — re-arm for next crossing
      lastBetaRegion = 'ambiguous';
      betaFlipArmed  = true;
    }

    // Gravity projection
    const betaOffset = Math.max(-90, Math.min(90, rawBeta - 90));
   // DOPO (corretto — formula W3C):
const bRad = rawBeta  * Math.PI / 180;
const gRad = rawGamma * Math.PI / 180;
// Nessun clamp su beta: lasciamo che il segno si inverta naturalmente
// quando il telefono è upside-down (gestito già dallo snap a 180°)
const worldGx =  Math.sin(gRad) * GRAVITY_STRENGTH * 20;
const worldGy =  Math.cos(gRad) * Math.sin(bRad) * GRAVITY_STRENGTH * 20;

    const snapRad = -snapAngle * Math.PI / 180;
    const cos     = Math.cos(snapRad);
    const sin     = Math.sin(snapRad);
    gravity.x = worldGx * cos - worldGy * sin;
    gravity.y = worldGx * sin + worldGy * cos;

    if (Math.abs(gravity.x) < 0.0001 && Math.abs(gravity.y) < 0.0001) {
      gravity.y = GRAVITY_STRENGTH;
    }

    updateDivBTransform();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  GRAVITY — DESKTOP
  //  FIX #7: Guard screenX/Y behind screenAPIAvailable flag.
  //  Falls back to constant downward gravity when the API is unavailable.
  // ═══════════════════════════════════════════════════════════════════════════
  function updateGravityFromWindow() {
    if (!screenAPIAvailable) {
      // Iframe / PWA / unsupported context — constant downward gravity
      gravity.x = 0;
      gravity.y = GRAVITY_STRENGTH;
      return;
    }

    const dx = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenX - prevScreenX));
    const dy = Math.max(-MAX_WIN_DELTA, Math.min(MAX_WIN_DELTA, window.screenY - prevScreenY));
    prevScreenX = window.screenX;
    prevScreenY = window.screenY;

    winVelX = winVelX * (1 - WIN_LOWPASS) + dx * WIN_LOWPASS;
    winVelY = winVelY * (1 - WIN_LOWPASS) + dy * WIN_LOWPASS;

    gravity.x = winVelX * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
    gravity.y = GRAVITY_STRENGTH + winVelY * WIN_ACCEL_SCALE * GRAVITY_STRENGTH * 20;
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  DEVICE ORIENTATION SETUP
  //  FIX #10: Listen to both 'deviceorientation' (relative) and
  //  'deviceorientationabsolute' (Android absolute). Absolute fires only when
  //  relative is unavailable or less accurate, so we prefer whichever arrives.
  //  Once we receive an absolute event we stop treating relative events as
  //  authoritative (they may come in simultaneously on some browsers).
  // ═══════════════════════════════════════════════════════════════════════════
  function startOrientation() {
    let absoluteReceived = false;

    window.addEventListener('deviceorientationabsolute', (e) => {
      usingGyro = true;
      absoluteReceived = true;
      updateGravityFromOrientation(e.beta, e.gamma, true);
    });

    window.addEventListener('deviceorientation', (e) => {
      if (absoluteReceived) return; // prefer absolute when available
      usingGyro = true;
      updateGravityFromOrientation(e.beta, e.gamma, e.absolute || false);
    });
  }

  permBtn.addEventListener('click', async () => {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          overlay.classList.add('hidden');
          startOrientation();
        }
      } catch(e) {
        overlay.querySelector('p').textContent = "Permission denied. Tilt won't work.";
      }
    } else {
      overlay.classList.add('hidden');
      startOrientation();
    }
  });

  if (typeof DeviceOrientationEvent === 'undefined' ||
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    overlay.classList.add('hidden');
    startOrientation();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  OBSTACLES
  //
  //  FIX #3 + FIX #9:
  //  - Rects are now computed in div-a's LOCAL coordinate frame by
  //    un-rotating the screen-space rect, instead of naively subtracting
  //    canvas.getBoundingClientRect() (which is post-transform).
  //  - A ResizeObserver per obstacle element marks obstaclesDirty instead of
  //    polling getBoundingClientRect every 10 frames.
  // ═══════════════════════════════════════════════════════════════════════════

  /**
   * Convert a screen-space DOMRect into div-a's local (un-rotated) coordinate frame.
   * div-a is centered on screen and rotated by snapAngle degrees.
   * We un-rotate the rect's center by -snapAngle around div-a's center,
   * then express w/h in the local frame (swap if needed for 90°/270° snaps).
   */
  function screenRectToDivALocal(r) {
    const aRect  = divA.getBoundingClientRect(); // always axis-aligned (it is fixed:inset:0)
    const aCx    = aRect.left + aRect.width  / 2;
    const aCy    = aRect.top  + aRect.height / 2;

    // Center of the obstacle in screen space
    const rCx = r.left + r.width  / 2;
    const rCy = r.top  + r.height / 2;

    // Translate to div-a center, then un-rotate by -snapAngle
    const rad  = -snapAngle * Math.PI / 180;
    const cos  = Math.cos(rad);
    const sin  = Math.sin(rad);
    const dx   = rCx - aCx;
    const dy   = rCy - aCy;
    const lx   = dx * cos - dy * sin;
    const ly   = dx * sin + dy * cos;

    // In the local frame, w/h also need to be un-rotated.
    // For axis-aligned elements and 90°-multiple snaps, just swap.
    const snapMod = ((snapAngle % 180) + 180) % 180;
    const localW  = snapMod === 90 ? r.height : r.width;
    const localH  = snapMod === 90 ? r.width  : r.height;

    // Convert from center-relative to top-left in div-a coordinate space
    // (origin = top-left of div-a = canvas origin)
    return {
      x: lx - localW / 2 + canvasW / 2,
      y: ly - localH / 2 + canvasH / 2,
      w: localW,
      h: localH,
    };
  }

  function refreshObstacles() {
    if (!obstaclesDirty) return;
    obstaclesDirty = false;
    obstacleRects  = [];

    const allElements = new Set();

    for (const sel of obstacleSelectors) {
      document.querySelectorAll(sel).forEach(el => allElements.add(el));
    }
    document.querySelectorAll('.obstacle').forEach(el => allElements.add(el));

    for (const el of allElements) {
      const r = el.getBoundingClientRect();
      obstacleRects.push(screenRectToDivALocal(r));

      // FIX #9: Attach a ResizeObserver if not already watching this element
      if (!obstacleROMap.has(el)) {
        const obs = new ResizeObserver(() => { obstaclesDirty = true; });
        obs.observe(el);
        obstacleROMap.set(el, obs);
      }
    }
  }

  function addObstacle(cssSelector) {
    if (!obstacleSelectors.includes(cssSelector)) {
      obstacleSelectors.push(cssSelector);
      obstaclesDirty = true;
    }
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  PHYSICS
  // ═══════════════════════════════════════════════════════════════════════════
  function resolveWallCollision() {
    const r = ball.radius;
    if (ball.x - r < 0)       { ball.x = r;           ball.vx =  Math.abs(ball.vx) * RESTITUTION; }
    if (ball.x + r > canvasW) { ball.x = canvasW - r;  ball.vx = -Math.abs(ball.vx) * RESTITUTION; }
    if (ball.y - r < 0)       { ball.y = r;            ball.vy =  Math.abs(ball.vy) * RESTITUTION; }
    if (ball.y + r > canvasH) {
      ball.y  = canvasH - r;
      ball.vy = -Math.abs(ball.vy) * RESTITUTION;
      ball.vx *= FRICTION;
    }
  }

  function resolveObstacleCollisions() {
    for (const obs of obstacleRects) {
      const cx   = Math.max(obs.x, Math.min(ball.x, obs.x + obs.w));
      const cy   = Math.max(obs.y, Math.min(ball.y, obs.y + obs.h));
      const dx   = ball.x - cx;
      const dy   = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ball.radius && dist > 0) {
        const pen = ball.radius - dist;
        const nx  = dx / dist;
        const ny  = dy / dist;
        ball.x += nx * pen;
        ball.y += ny * pen;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          ball.vx -= (1 + RESTITUTION) * dot * nx;
          ball.vy -= (1 + RESTITUTION) * dot * ny;
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;
        }
      }
    }
  }

  function updatePhysics(dt) {
    const safeDt = Math.min(dt, 32);
    ball.vx += gravity.x * safeDt;
    ball.vy += gravity.y * safeDt;
    ball.vx *= DAMPING;
    ball.vy *= DAMPING;
    ball.x  += ball.vx * safeDt;
    ball.y  += ball.vy * safeDt;
    resolveWallCollision();
    resolveObstacleCollisions();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  RENDERING
  //  FIX #2: clearRect now uses canvasW/canvasH which are the CSS-pixel
  //  dimensions. Since ctx has the DPR transform applied via setTransform(),
  //  these values correctly map to the full physical canvas area.
  // ═══════════════════════════════════════════════════════════════════════════
  function render() {
    // FIX #2: correct — CSS-pixel dimensions match the transformed context
    ctx.clearRect(0, 0, canvasW, canvasH);

    ctx.save();
    ctx.shadowColor   = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur    = 12;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 4;

    const grad = ctx.createRadialGradient(
      ball.x - ball.radius * 0.3, ball.y - ball.radius * 0.3, ball.radius * 0.1,
      ball.x, ball.y, ball.radius
    );
    grad.addColorStop(0, '#a0cfff');
    grad.addColorStop(0.5, '#4f8ef7');
    grad.addColorStop(1, '#1a3a7a');

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Obstacle debug outlines
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth   = 1;
    for (const obs of obstacleRects) ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
    ctx.restore();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  VISIBILITY CHANGE — FIX #5
  //  Pause the loop when the tab is hidden, resume when visible.
  //  This prevents dt spikes (spiral-of-death) after the tab returns from
  //  background, and eliminates unnecessary CPU/GPU usage.
  // ═══════════════════════════════════════════════════════════════════════════
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId    = null;
        lastTime = null; // reset so dt is 0 on resume
      }
    } else {
      if (rafId === null) {
        rafId = requestAnimationFrame(loop);
      }
    }
  });


  // ═══════════════════════════════════════════════════════════════════════════
  //  MAIN LOOP
  //  FIX #5: Store RAF id in rafId for cancellation.
  //  FIX #9: refreshObstacles() is now O(1) when nothing changed (dirty flag).
  // ═══════════════════════════════════════════════════════════════════════════
  let lastTime   = null;

  function loop(timestamp) {
    rafId = requestAnimationFrame(loop);

    if (!lastTime) lastTime = timestamp;
    const dt = timestamp - lastTime;
    lastTime  = timestamp;

    if (!usingGyro) updateGravityFromWindow();
    refreshObstacles(); // O(1) when !obstaclesDirty

    updatePhysics(dt);
    render();
    updateDebug();
  }


  // ═══════════════════════════════════════════════════════════════════════════
  //  INIT
  //  FIX #11: Wait for the first ResizeObserver callback before starting the
  //  loop, so canvasW/H are correct from frame 1.
  //  A 50ms setTimeout fallback is kept only as a safety net in case RO
  //  never fires (e.g. display:none at startup).
  // ═══════════════════════════════════════════════════════════════════════════
  let initialized = false;

  function init() {
    if (initialized) return;
    initialized = true;

    resizeCanvas();
    ball.x  = canvasW / 2;
    ball.y  = canvasH / 4;
    ball.vx = 1.5;
    ball.vy = 0;
    rafId = requestAnimationFrame(loop);
  }

  // FIX #11: Trigger init on the first ResizeObserver callback instead of
  // a blind setTimeout. The RO is already observing divA above; we hook into
  // it by replacing its callback temporarily.
  const roOriginalCallback = ro; // already observing; init fires on first entry
  const initRO = new ResizeObserver(() => {
    init();
    initRO.disconnect(); // one-shot
  });
  initRO.observe(divA);

  // Safety-net fallback: if the initRO never fires within 100ms, start anyway
  setTimeout(init, 100);


  // ═══════════════════════════════════════════════════════════════════════════
  //  PUBLIC API
  // ═══════════════════════════════════════════════════════════════════════════
  window.physicsApp = {
    addObstacle,
    getBall: () => ({ ...ball }),
    // FIX #5: expose stop/start for external lifecycle management
    stop:  () => { if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; } },
    start: () => { if (rafId === null) { lastTime = null; rafId = requestAnimationFrame(loop); } },
  };

})();
</script>
</body>
</html>
